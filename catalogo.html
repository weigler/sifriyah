<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sifriyah · Acervo</title>
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#4E1C28">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #F5EFE0;
    color: #2B2118;
    font-family: 'Source Serif 4', Georgia, serif;
    padding-bottom: 40px;
  }
  header {
    background: #4E1C28;
    color: #F5EFE0;
    padding: 28px 20px 22px;
  }
  header .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: #B8933E;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-size: 32px;
    margin: 0;
  }
  #busca {
    max-width: 640px;
    margin: 20px auto 0;
    padding: 0 16px;
  }
  #busca input {
    width: 100%;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 15px;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1.5px solid #D8CBB0;
    background: #fff;
    box-sizing: border-box;
  }
  #lista {
    max-width: 640px;
    margin: 16px auto 0;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .livro {
    background: #FBF7EC;
    border: 1.5px solid #D8CBB0;
    border-radius: 10px;
    padding: 16px;
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .livro .capa {
    width: 48px;
    height: 68px;
    object-fit: cover;
    border-radius: 4px;
    border: 1px solid #D8CBB0;
    flex-shrink: 0;
  }
  .livro .capa-vazia {
    width: 48px;
    height: 68px;
    border-radius: 4px;
    border: 1px solid #D8CBB0;
    background: #F5EFE0;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    opacity: 0.4;
  }
  .livro .info { flex: 1; min-width: 0; }
  .livro .titulo {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: 17px;
  }
  .livro .autor { font-size: 13px; color: #5B4E3F; }
  .livro .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    margin-top: 6px;
  }
  .status.disponivel { color: #4B6B4A; }
  .status.emprestado { color: #9C4A2C; }
  .btn {
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 600;
    font-size: 13px;
    padding: 9px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: #2E7D5B;
    color: #fff;
    text-decoration: none;
    white-space: nowrap;
    display: inline-block;
  }
  .vazio, .erro {
    text-align: center;
    color: #5B4E3F;
    padding: 40px 20px;
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Grupo Caseiro · Fichário</div>
  <h1 id="tituloBiblioteca">Sifriyah</h1>
  <div style="font-size:13px; opacity:0.75; margin-top:4px;">livros disponíveis pra empréstimo</div>
</header>

<div id="busca">
  <input type="text" id="campoBusca" placeholder="Buscar por título ou autor…">
</div>

<div id="lista">
  <div class="vazio">Carregando acervo…</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script>
// ======================================================================
// COLE AQUI a mesma configuração do Firebase que você usou no app admin,
// e o mesmo "código da biblioteca" (docId) que aparece na aba Ajustes.
// ======================================================================
const firebaseConfig = {
  apiKey: "AIzaSyA8NS9oK6BZdv7EcHxOvY7UyTgto6voIvA",
  authDomain: "sifriyah.firebaseapp.com",
  projectId: "sifriyah",
  storageBucket: "sifriyah.firebasestorage.app",
  messagingSenderId: "54128425070",
  appId: "1:54128425070:web:8d1d198d375d63593b0e7f",
};
const DOC_ID = "principal";
// ======================================================================

let todosLivros = [];
let whatsappContato = "";
let bibliotecaNome = "Sifriyah";

function normalizaTelefone(tel) {
  const digits = (tel || "").replace(/\D/g, "");
  if (!digits) return "";
  if (digits.length <= 11) return "55" + digits;
  return digits;
}
function fmtDate(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}
function linkReserva(livro) {
  const texto = `Oi! Vi no catálogo do ${bibliotecaNome} que o livro "${livro.titulo}" ${
    livro.disponivel ? "está disponível" : "deve ficar disponível em breve"
  }. Posso reservar?`;
  return `https://wa.me/${normalizaTelefone(whatsappContato)}?text=${encodeURIComponent(texto)}`;
}

function render(filtro) {
  const lista = document.getElementById("lista");
  const termo = (filtro || "").trim().toLowerCase();
  const filtrados = todosLivros.filter(
    (l) => l.titulo.toLowerCase().includes(termo) || (l.autor || "").toLowerCase().includes(termo)
  );

  if (filtrados.length === 0) {
    lista.innerHTML = '<div class="vazio">Nenhum livro encontrado.</div>';
    return;
  }

  lista.innerHTML = filtrados
    .map((l) => {
      const statusHtml = l.disponivel
        ? `<div class="status disponivel">● disponível agora</div>`
        : `<div class="status emprestado">● emprestado${l.proximaData ? " · previsão de volta em " + fmtDate(l.proximaData) : ""}</div>`;
      const botao = whatsappContato
        ? `<a class="btn" href="${linkReserva(l)}" target="_blank" rel="noreferrer">💬 Reservar</a>`
        : "";
      const capaHtml = l.capaUrl
        ? `<img class="capa" src="${l.capaUrl}" alt="">`
        : `<div class="capa-vazia">📕</div>`;
      return `
        <div class="livro">
          ${capaHtml}
          <div class="info">
            <div class="titulo">${l.titulo}</div>
            ${l.autor ? `<div class="autor">${l.autor}</div>` : ""}
            ${statusHtml}
          </div>
          ${botao}
        </div>`;
    })
    .join("");
}

function iniciar() {
  if (firebaseConfig.apiKey === "COLE_AQUI") {
    document.getElementById("lista").innerHTML =
      '<div class="erro">Essa vitrine ainda não foi configurada. Abra o arquivo catalogo.html e cole a configuração do Firebase.</div>';
    return;
  }
  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  db.collection("sifriyah_publico")
    .doc(DOC_ID)
    .onSnapshot(
      (snap) => {
        if (!snap.exists) {
          document.getElementById("lista").innerHTML =
            '<div class="vazio">Ainda não há livros publicados nessa biblioteca.</div>';
          return;
        }
        const dados = snap.data();
        todosLivros = dados.livros || [];
        whatsappContato = dados.whatsappContato || "";
        bibliotecaNome = dados.bibliotecaNome || "Sifriyah";
        document.getElementById("tituloBiblioteca").textContent = bibliotecaNome;
        render(document.getElementById("campoBusca").value);
      },
      (err) => {
        document.getElementById("lista").innerHTML =
          '<div class="erro">Não consegui carregar o acervo agora. Confere a conexão.</div>';
        console.error(err);
      }
    );
}

document.getElementById("campoBusca").addEventListener("input", (e) => render(e.target.value));
iniciar();
</script>
</body>
</html>
