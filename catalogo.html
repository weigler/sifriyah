<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sifriyah · Acervo</title>
<link rel="manifest" href="manifest-catalogo.json">
<link rel="apple-touch-icon" href="icon-catalogo-192.png">
<link rel="icon" href="icon-catalogo-192.png">
<meta name="theme-color" content="#B8933E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Catálogo">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #F5EFE0;
    color: #2B2118;
    font-family: 'Source Serif 4', Georgia, serif;
    padding-bottom: 40px;
  }
  header {
    background: #4E1C28;
    color: #F5EFE0;
    padding: 28px 20px 22px;
  }
  header .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: #B8933E;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-size: 32px;
    margin: 0;
  }
  #busca {
    max-width: 720px;
    margin: 20px auto 0;
    padding: 0 16px;
    display: flex;
    gap: 8px;
  }
  #busca input { flex: 2; }
  #busca select {
    flex: 1;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 15px;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1.5px solid #D8CBB0;
    background: #fff;
  }
  #promoBanner {
    max-width: 720px;
    margin: 16px auto 0;
    padding: 0 16px;
  }
  #promoBanner .caixa {
    background: #FBF3DC;
    border: 1.5px solid #B8933E;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13.5px;
  }
  #busca input {
    width: 100%;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 15px;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1.5px solid #D8CBB0;
    background: #fff;
    box-sizing: border-box;
  }
  #lista {
    max-width: 720px;
    margin: 16px auto 0;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .livro {
    background: #FBF7EC;
    border: 1.5px solid #D8CBB0;
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    gap: 14px;
  }
  .livro .capa {
    width: 92px;
    height: 132px;
    flex-shrink: 0;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid #D8CBB0;
  }
  .livro .capa-vazia {
    width: 92px;
    height: 132px;
    flex-shrink: 0;
    border-radius: 6px;
    border: 1px solid #D8CBB0;
    background: #F5EFE0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    opacity: 0.4;
  }
  .livro .info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .livro .conteudo { flex: 1; }
  .livro .titulo {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: 16px;
    line-height: 1.3;
  }
  .livro .autor { font-size: 12.5px; color: #5B4E3F; margin-top: 3px; line-height: 1.45; }
  .livro .sinopse summary {
    cursor: pointer;
    color: #6B2737;
    font-size: 12.5px;
    margin-top: 4px;
  }
  .livro .sinopse div {
    font-size: 13px;
    color: #5B4E3F;
    margin-top: 6px;
    line-height: 1.55;
  }
  .livro .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    margin-top: 8px;
  }
  .status.disponivel { color: #4B6B4A; }
  .status.emprestado { color: #9C4A2C; }
  .btn {
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 600;
    font-size: 13px;
    padding: 9px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: #2E7D5B;
    color: #fff;
    text-decoration: none;
    white-space: nowrap;
    display: block;
    text-align: center;
  }
  .btn-wrap { margin-top: auto; padding-top: 10px; }
  .fila-form {
    margin-top: 8px;
    padding: 10px;
    background: #F5EFE0;
    border: 1.5px solid #D8CBB0;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .fila-form input {
    width: 100%;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1.5px solid #D8CBB0;
    background: #fff;
    box-sizing: border-box;
  }
  .fila-form .fila-sem-codigo-toggle button {
    background: none;
    border: none;
    color: #6B2737;
    font-size: 12px;
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
  }
  .fila-form .fila-sem-codigo {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .fila-form .fila-msg { font-size: 12.5px; margin-top: 2px; }
  .fila-form button.btn { display: inline-block; }
  .vazio, .erro {
    text-align: center;
    color: #5B4E3F;
    padding: 40px 20px;
    font-size: 14px;
  }
  #precadastro {
    max-width: 480px;
    margin: 40px auto 0;
    padding: 0 16px;
  }
  #precadastro .caixa {
    background: #FBF7EC;
    border: 1.5px solid #D8CBB0;
    border-radius: 10px;
    padding: 20px;
  }
  #precadastro h2 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 18px;
    margin: 0 0 4px;
  }
  #precadastro p { font-size: 13px; color: #5B4E3F; margin: 0 0 14px; }
  #precadastro input {
    width: 100%;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 14px;
    padding: 9px 11px;
    border-radius: 6px;
    border: 1.5px solid #D8CBB0;
    background: #fff;
    box-sizing: border-box;
    margin-bottom: 8px;
  }
  #precadastro .linha { display: flex; gap: 8px; }
  #precadastro .linha input { flex: 1; }
  #precadastro button {
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 600;
    font-size: 14px;
    padding: 10px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: #6B2737;
    color: #fff;
  }
  #precadastroMsg { font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Grupo Caseiro · Fichário</div>
  <div style="display:flex; align-items:center; gap:10px;">
    <img src="icon-catalogo-192.png" alt="" style="width:34px; height:34px; border-radius:8px; border:1px solid #B8933E;" onerror="this.style.display='none'">
    <h1 id="tituloBiblioteca" style="margin:0;">Sifriyah</h1>
  </div>
  <div style="font-size:13px; opacity:0.75; margin-top:4px;">livros disponíveis pra empréstimo</div>
</header>

<div id="promoBanner"></div>

<div id="busca">
  <input type="text" id="campoBusca" placeholder="Buscar por título ou autor…">
  <select id="filtroCategoria">
    <option value="">Todas as categorias</option>
  </select>
</div>

<div id="lista">
  <div class="vazio">Carregando acervo…</div>
</div>

<div id="precadastro">
  <div class="caixa">
    <h2>Ainda não é cadastrado(a)?</h2>
    <p>Deixe seus dados aqui pra facilitar o próximo empréstimo — não precisa esperar pra reservar um livro.</p>
    <div class="linha">
      <input type="text" id="pcNome" placeholder="Nome">
      <input type="text" id="pcSobrenome" placeholder="Sobrenome">
    </div>
    <input type="text" id="pcTelefone" placeholder="Celular com DDD">
    <input type="email" id="pcEmail" placeholder="E-mail (opcional)">
    <button id="pcEnviar">Enviar meus dados</button>
    <div id="precadastroMsg"></div>
  </div>
</div>


<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script>
// ======================================================================
// COLE AQUI a mesma configuração do Firebase que você usou no app admin,
// e o mesmo "código da biblioteca" (docId) que aparece na aba Ajustes.
// ======================================================================
const firebaseConfig = {
  apiKey: "AIzaSyA8NS9oK6BZdv7EcHxOvY7UyTgto6voIvA",
  authDomain: "sifriyah.firebaseapp.com",
  projectId: "sifriyah",
  storageBucket: "sifriyah.firebasestorage.app",
  messagingSenderId: "54128425070",
  appId: "1:54128425070:web:8d1d198d375d63593b0e7f",
};
const DOC_ID = "principal";
// ======================================================================

let todosLivros = [];
let whatsappContato = "";
let bibliotecaNome = "Sifriyah";
let promocaoAtual = null;

function normalizaTelefone(tel) {
  const digits = (tel || "").replace(/\D/g, "");
  if (!digits) return "";
  if (digits.length <= 11) return "55" + digits;
  return digits;
}
function fmtDate(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}
function escapeHtml(s) {
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function linkReserva(livro) {
  const texto = `Oi! Vi no catálogo do ${bibliotecaNome} que o livro "${livro.titulo}" está disponível. Posso reservar?`;
  return `https://wa.me/${normalizaTelefone(whatsappContato)}?text=${encodeURIComponent(texto)}`;
}
function toggleFilaForm(livroId) {
  const el = document.getElementById(`fila-form-${livroId}`);
  if (!el) return;
  el.style.display = el.style.display === "none" ? "flex" : "none";
}
function toggleSemCodigo(livroId) {
  const el = document.getElementById(`fila-sem-codigo-${livroId}`);
  if (!el) return;
  el.style.display = el.style.display === "none" ? "flex" : "none";
}
async function enviarPedidoFila(livroId) {
  const livro = todosLivros.find((l) => l.id === livroId);
  if (!livro) return;
  const campoCodigo = document.getElementById(`fila-codigo-${livroId}`);
  const campoNome = document.getElementById(`fila-nome-${livroId}`);
  const campoSobrenome = document.getElementById(`fila-sobrenome-${livroId}`);
  const campoTelefone = document.getElementById(`fila-telefone-${livroId}`);
  const msg = document.getElementById(`fila-msg-${livroId}`);

  const codigo = (campoCodigo.value || "").trim().toUpperCase();
  const nome = (campoNome.value || "").trim();
  const sobrenome = (campoSobrenome.value || "").trim();
  const telefone = (campoTelefone.value || "").trim();

  if (!codigo && !(nome && telefone)) {
    msg.style.color = "#9C4A2C";
    msg.textContent = "Digita seu código de usuário, ou seu nome e celular.";
    return;
  }
  try {
    const db = firebase.firestore();
    await db.collection("sifriyah_pedidos_fila").add({
      biblioteca: DOC_ID,
      livroId,
      tituloLivro: livro.titulo,
      codigoUsuario: codigo || null,
      nome: nome || null,
      sobrenome: sobrenome || null,
      telefone: telefone || null,
      criadoEm: Date.now(),
      atendido: false,
    });
    msg.style.color = "#4B6B4A";
    msg.textContent = "Pedido enviado! Você entra na fila assim que a biblioteca confirmar.";
    campoCodigo.value = "";
    campoNome.value = "";
    campoSobrenome.value = "";
    campoTelefone.value = "";
  } catch (err) {
    msg.style.color = "#9C4A2C";
    msg.textContent = "Não consegui enviar agora. Tenta de novo em instantes.";
    console.error(err);
  }
}

function atualizarCategorias() {
  const select = document.getElementById("filtroCategoria");
  const atual = select.value;
  const categorias = Array.from(new Set(todosLivros.map((l) => l.categoria).filter(Boolean))).sort();
  select.innerHTML =
    '<option value="">Todas as categorias</option>' +
    categorias.map((c) => `<option value="${c}">${c}</option>`).join("");
  if (categorias.includes(atual)) select.value = atual;
}

function renderPromo() {
  const el = document.getElementById("promoBanner");
  if (!promocaoAtual || !promocaoAtual.ativa || !promocaoAtual.descricao) {
    el.innerHTML = "";
    return;
  }
  el.innerHTML = `<div class="caixa">🎉 <b>Promoção:</b> ${promocaoAtual.descricao}${
    promocaoAtual.validoAte ? " (até " + fmtDate(promocaoAtual.validoAte) + ")" : ""
  }</div>`;
}

function render() {
  const lista = document.getElementById("lista");
  const termo = (document.getElementById("campoBusca").value || "").trim().toLowerCase();
  const categoria = document.getElementById("filtroCategoria").value;
  const filtrados = todosLivros.filter((l) => {
    const bateBusca = l.titulo.toLowerCase().includes(termo) || (l.autor || "").toLowerCase().includes(termo);
    const bateCategoria = !categoria || l.categoria === categoria;
    return bateBusca && bateCategoria;
  });

  if (filtrados.length === 0) {
    lista.innerHTML = '<div class="vazio">Nenhum livro encontrado.</div>';
    return;
  }

  lista.innerHTML = filtrados
    .map((l) => {
      const statusHtml = l.disponivel
        ? `<div class="status disponivel">● disponível agora</div>`
        : `<div class="status emprestado">● emprestado${l.proximaData ? " · previsão de volta em " + fmtDate(l.proximaData) : ""}</div>`;
      let botao = "";
      if (l.disponivel) {
        if (whatsappContato) {
          botao = `<a class="btn" href="${linkReserva(l)}" target="_blank" rel="noreferrer">💬 Reservar</a>`;
        }
      } else {
        botao = `<button type="button" class="btn" style="background:#B8933E" onclick="toggleFilaForm('${l.id}')">⏳ Entrar na fila</button>`;
      }
      const filaFormHtml = !l.disponivel
        ? `
        <div class="fila-form" id="fila-form-${l.id}" style="display:none;">
          <input type="text" id="fila-codigo-${l.id}" placeholder="Código de usuário (se já tiver)" maxlength="10">
          <div class="fila-sem-codigo-toggle"><button type="button" onclick="toggleSemCodigo('${l.id}')">ainda não tenho código</button></div>
          <div class="fila-sem-codigo" id="fila-sem-codigo-${l.id}" style="display:none;">
            <input type="text" id="fila-nome-${l.id}" placeholder="Nome">
            <input type="text" id="fila-sobrenome-${l.id}" placeholder="Sobrenome">
            <input type="text" id="fila-telefone-${l.id}" placeholder="Celular com DDD">
          </div>
          <button type="button" class="btn" onclick="enviarPedidoFila('${l.id}')">Confirmar entrada na fila</button>
          <div class="fila-msg" id="fila-msg-${l.id}"></div>
        </div>`
        : "";
      const capaHtml = l.capaUrl
        ? `<img class="capa" src="${l.capaUrl}" alt="">`
        : `<div class="capa-vazia">📕</div>`;
      const sinopseHtml = l.sinopse
        ? `<details class="sinopse"><summary>ler sinopse</summary><div>${escapeHtml(l.sinopse)}</div></details>`
        : "";
      return `
        <div class="livro">
          ${capaHtml}
          <div class="info">
            <div class="conteudo">
              <div class="titulo">${l.titulo}</div>
              ${l.autor ? `<div class="autor">${l.autor}</div>` : ""}
              ${l.categoria ? `<div class="autor">${l.categoria}</div>` : ""}
              ${l.nivel ? `<div class="autor">${escapeHtml(l.nivel)}</div>` : ""}
              ${l.paginas ? `<div class="autor">${l.paginas} páginas</div>` : ""}
              ${sinopseHtml}
              ${l.linkExterno ? `<div class="autor"><a style="text-decoration:underline; color:inherit;" href="${escapeHtml(l.linkExterno)}" target="_blank" rel="noreferrer">🔗 Comprar na Amazon</a></div>` : ""}
              ${statusHtml}
            </div>
            ${botao ? `<div class="btn-wrap">${botao}${filaFormHtml}</div>` : ""}
          </div>
        </div>`;
    })
    .join("");
}

function iniciar() {
  if (firebaseConfig.apiKey === "COLE_AQUI") {
    document.getElementById("lista").innerHTML =
      '<div class="erro">Essa vitrine ainda não foi configurada. Abra o arquivo catalogo.html e cole a configuração do Firebase.</div>';
    return;
  }
  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  db.collection("sifriyah_publico")
    .doc(DOC_ID)
    .onSnapshot(
      (snap) => {
        if (!snap.exists) {
          document.getElementById("lista").innerHTML =
            '<div class="vazio">Ainda não há livros publicados nessa biblioteca.</div>';
          return;
        }
        const dados = snap.data();
        todosLivros = dados.livros || [];
        whatsappContato = dados.whatsappContato || "";
        bibliotecaNome = dados.bibliotecaNome || "Sifriyah";
        promocaoAtual = dados.promocao || null;
        document.getElementById("tituloBiblioteca").textContent = bibliotecaNome;
        atualizarCategorias();
        renderPromo();
        render();
      },
      (err) => {
        document.getElementById("lista").innerHTML =
          '<div class="erro">Não consegui carregar o acervo agora. Confere a conexão.</div>';
        console.error(err);
      }
    );
}

document.getElementById("campoBusca").addEventListener("input", render);
document.getElementById("filtroCategoria").addEventListener("change", render);

document.getElementById("pcEnviar").addEventListener("click", async () => {
  const nome = document.getElementById("pcNome").value.trim();
  const sobrenome = document.getElementById("pcSobrenome").value.trim();
  const telefone = document.getElementById("pcTelefone").value.trim();
  const email = document.getElementById("pcEmail").value.trim();
  const msg = document.getElementById("precadastroMsg");

  if (!nome || !telefone) {
    msg.style.color = "#9C4A2C";
    msg.textContent = "Preenche pelo menos nome e celular.";
    return;
  }
  try {
    const db = firebase.firestore();
    await db.collection("sifriyah_precadastros").add({
      biblioteca: DOC_ID,
      nome,
      sobrenome,
      telefone,
      email,
      criadoEm: Date.now(),
    });
    msg.style.color = "#4B6B4A";
    msg.textContent = "Recebido! Assim que possível você será cadastrado(a).";
    document.getElementById("pcNome").value = "";
    document.getElementById("pcSobrenome").value = "";
    document.getElementById("pcTelefone").value = "";
    document.getElementById("pcEmail").value = "";
  } catch (err) {
    msg.style.color = "#9C4A2C";
    msg.textContent = "Não consegui enviar agora. Tenta de novo em instantes.";
    console.error(err);
  }
});

iniciar();
</script>
</body>
</html>
