const { useState, useEffect, useMemo } = React;

window.storage = {
  async get(key) {
    const v = localStorage.getItem(key);
    return v !== null ? { key, value: v, shared: false } : null;
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value, shared: false };
  },
};


// ---- Fontes ----
function useFonts() {
  useEffect(() => {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href =
      "https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Source+Serif+4:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap";
    document.head.appendChild(link);
    return () => document.head.removeChild(link);
  }, []);
}

const STORAGE_KEY = "sifriyah-biblioteca-dados"; // v1.1
const APP_NAME = "Sifriyah"; // ספרייה — hebraico moderno para "biblioteca"

const COLORS = {

  card: "#FBF7EC",

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function fmtDate(iso) {
  if (!iso) return "—";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}

function fmtMoney(v) {
  return (v || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}

function daysBetween(iso) {
  const d1 = new Date(iso);
  const d2 = new Date(todayISO());
  return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
}

// ---- Criptografia local (senha nunca sai do aparelho) ----
function bytesToB64(bytes) {
  let bin = "";
  bytes.forEach((b) => (bin += String.fromCharCode(b)));
  return btoa(bin);
}
function b64ToBytes(b64) {
  return Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
}
async function deriveKey(password, saltB64) {
  const enc = new TextEncoder();
  const salt = saltB64 ? b64ToBytes(saltB64) : crypto.getRandomValues(new Uint8Array(16));
  const material = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, [
    "deriveKey",
  ]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 150000, hash: "SHA-256" },
    material,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
  return { key, salt };
}
async function encryptJSON(obj, password) {
  const { key, salt } = await deriveKey(password);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(JSON.stringify(obj)));
  return JSON.stringify({
    v: 1,
    salt: bytesToB64(salt),
    iv: bytesToB64(iv),
    data: bytesToB64(new Uint8Array(cipher)),
  });
}
async function decryptJSON(raw, password) {
  const payload = JSON.parse(raw);
  const { key } = await deriveKey(password, payload.salt);
  const iv = b64ToBytes(payload.iv);
  const data = b64ToBytes(payload.data);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
  return JSON.parse(new TextDecoder().decode(plain));
}

// ---- Sincronização em nuvem (Firebase Firestore) — opcional ----
const CLOUD_CONFIG_KEY = "sifriyah-cloud-config"; // fica salvo local em cada aparelho (não é segredo)
let _fbApp = null;
let _fbDb = null;

function lerConfigNuvem() {
  try {
    const raw = localStorage.getItem(CLOUD_CONFIG_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    return null;
  }
}
function salvarConfigNuvem(cfg) {
  if (cfg) localStorage.setItem(CLOUD_CONFIG_KEY, JSON.stringify(cfg));
  else localStorage.removeItem(CLOUD_CONFIG_KEY);
}

function carregarScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) return resolve();
    const s = document.createElement("script");
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function inicializarFirebase(firebaseConfig) {
  if (_fbDb) return _fbDb;
  await carregarScript("https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js");
  await carregarScript("https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js");
  // eslint-disable-next-line no-undef
  _fbApp = firebase.initializeApp(firebaseConfig);
  // eslint-disable-next-line no-undef
  _fbDb = firebase.firestore();
  return _fbDb;
}

async function nuvemLer(firebaseConfig, docId) {
  const db = await inicializarFirebase(firebaseConfig);
  const snap = await db.collection("sifriyah").doc(docId).get();
  if (!snap.exists) return null;
  return snap.data().blob || null;
}

async function nuvemSalvar(firebaseConfig, docId, blob) {
  const db = await inicializarFirebase(firebaseConfig);
  await db
    .collection("sifriyah")
    .doc(docId)
    .set({ blob, atualizadoEm: Date.now() });
}

function nuvemOuvir(firebaseConfig, docId, onChange) {
  inicializarFirebase(firebaseConfig).then((db) => {
    db.collection("sifriyah")
      .doc(docId)
      .onSnapshot((snap) => {
        if (snap.exists) onChange(snap.data().blob || null);
      });
  });
  return () => {}; // desinscrever simplificado
}

// salva uma cópia PÚBLICA (sem senha, sem dados sensíveis) só com título/autor/disponibilidade
async function nuvemSalvarPublico(firebaseConfig, docId, dadosPublicos) {
  const db = await inicializarFirebase(firebaseConfig);
  await db
    .collection("sifriyah_publico")
    .doc(docId)
    .set({ ...dadosPublicos, atualizadoEm: Date.now() });
}

function nomeCompleto(p) {
  if (!p) return "";
  return `${p.nome || ""}${p.sobrenome ? " " + p.sobrenome : ""}`.trim();
}
function separarNome(nomeFull) {
  const partes = (nomeFull || "").trim().split(/\s+/);
  if (partes.length <= 1) return { nome: partes[0] || "", sobrenome: "" };
  return { nome: partes.slice(0, -1).join(" "), sobrenome: partes[partes.length - 1] };
}

// migra dados salvos no formato antigo (contatos como dicionário, sem páginas/nuvem etc.)
function migrarDados(parsed) {
  const livros = (parsed.livros || []).map((l) => ({
    paginas: null,
    dataAquisicao: null,
    capaUrl: null,
    ...l,
  }));

  let pessoas = parsed.pessoas;
  if (!pessoas) {
    const contatos = parsed.contatos || {};
    const nomesUnicos = new Set([
      ...Object.keys(contatos),
      ...((parsed.emprestimos || []).map((e) => e.pessoa).filter(Boolean)),
    ]);
    pessoas = Array.from(nomesUnicos).map((nomeFull) => {
      const { nome, sobrenome } = separarNome(nomeFull);
      const c = contatos[nomeFull] || {};
      return { id: uid(), nome, sobrenome, telefone: c.telefone || "", email: c.email || "" };
    });
  }

  return {
    livros,
    emprestimos: parsed.emprestimos || [],
    pessoas,
    cobrancas: parsed.cobrancas || [],
    config: parsed.config || { pix: "", recebedor: "" },
  };
}

function normalizaTelefone(tel) {
  const digits = (tel || "").replace(/\D/g, "");
  if (!digits) return "";
  if (digits.length <= 11) return "55" + digits; // assume Brasil, DDD+numero
  return digits;
}

function linkWhatsApp(telefone, texto) {
  const num = normalizaTelefone(telefone);
  return `https://wa.me/${num}?text=${encodeURIComponent(texto)}`;
}

function linkSMS(telefone, texto) {
  const num = (telefone || "").replace(/\D/g, "");
  return `sms:${num}?body=${encodeURIComponent(texto)}`;
}

// ---- Selo de status (elemento de assinatura) ----
function Stamp({ status }) {

    devolvido: { label: "DEVOLVIDO", color: COLORS.sage },
    atrasado: { label: "ATRASADO", color: COLORS.rust },

  const s = map[status];

        border: `2px solid ${s.color}`,

        flexShrink: 0,
        lineHeight: 1.15,
        padding: 4,

      }}

      {s.label}
    </div>

}

function Input(props) {

function Button({ children, variant = "primary", ...props }) {

function App() {
  useFonts();
  const [tab, setTab] = useState("emprestimos");
  const [livros, setLivros] = useState([]);
  const [emprestimos, setEmprestimos] = useState([]);
  const [pessoas, setPessoas] = useState([]); // [{id, nome, sobrenome, telefone, email}]
  const [cobrancas, setCobrancas] = useState([]); // [{id, emprestimoId, tipo, data}]
  const [config, setConfig] = useState({ pix: "", recebedor: "" });
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);

  // ---- Nuvem (opcional) ----
  const [cloudConfig, setCloudConfigState] = useState(() => lerConfigNuvem());
  const [cloudDocId, setCloudDocId] = useState(() => lerConfigNuvem()?.docId || "principal");
  const [cloudStatus, setCloudStatus] = useState("desligada"); // desligada | conectando | sincronizada | erro
  const ultimoBlobRef = React.useRef(null);

  async function backendGet() {
    if (cloudConfig) return await nuvemLer(cloudConfig, cloudDocId);
    const res = await window.storage.get(STORAGE_KEY, false);
    return res ? res.value : null;
  }
  async function backendSet(blob) {
    ultimoBlobRef.current = blob;
    if (cloudConfig) {
      await nuvemSalvar(cloudConfig, cloudDocId, blob);
    } else {
      await window.storage.set(STORAGE_KEY, blob, false);
    }
  }

  function configurarNuvem(firebaseConfig, docId) {
    const cfg = { ...firebaseConfig, docId: docId || "principal" };
    salvarConfigNuvem(cfg);
    setCloudConfigState(cfg);
    setCloudDocId(cfg.docId);
  }
  function desligarNuvem() {
    salvarConfigNuvem(null);
    setCloudConfigState(null);
  }

  // ---- Bloqueio por senha ----
  const [unlocked, setUnlocked] = useState(false);
  const [temDadosSalvos, setTemDadosSalvos] = useState(false);
  const [senhaAtual, setSenhaAtual] = useState(""); // fica só na memória, nunca é salva

  useEffect(() => {
    (async () => {
      setCloudStatus(cloudConfig ? "conectando" : "desligada");
      try {
        const blob = await backendGet();
        setTemDadosSalvos(!!blob);
        setCloudStatus(cloudConfig ? "sincronizada" : "desligada");
      } catch (e) {
        setTemDadosSalvos(false);
        setCloudStatus(cloudConfig ? "erro" : "desligada");
      }
      setLoaded(true);
    })();
  }, [cloudConfig, cloudDocId]);

  // recebe atualizações vindas de outros aparelhos em tempo real
  useEffect(() => {
    if (!cloudConfig || !unlocked || !senhaAtual) return;
    nuvemOuvir(cloudConfig, cloudDocId, async (blob) => {
      if (!blob || blob === ultimoBlobRef.current) return; // veio da própria gravação, ignora
      try {
        const parsed = await decryptJSON(blob, senhaAtual);
        const m = migrarDados(parsed);
        ultimoBlobRef.current = blob;
        setLivros(m.livros);
        setEmprestimos(m.emprestimos);
        setPessoas(m.pessoas);
        setCobrancas(m.cobrancas);
        setConfig(m.config);
      } catch (e) {
        // outro aparelho pode ter mandado com senha diferente; ignora silenciosamente
      }
    });
  }, [cloudConfig, cloudDocId, unlocked, senhaAtual]);

  async function desbloquear(senha) {
    const blob = await backendGet();
    if (!blob) {
      setSenhaAtual(senha);
      setUnlocked(true);
      return { ok: true };
    }
    try {
      const parsed = await decryptJSON(blob, senha);
      const m = migrarDados(parsed);
      ultimoBlobRef.current = blob;
      setLivros(m.livros);
      setEmprestimos(m.emprestimos);
      setPessoas(m.pessoas);
      setCobrancas(m.cobrancas);
      setConfig(m.config);
      setSenhaAtual(senha);
      setUnlocked(true);
      return { ok: true };
    } catch (e) {
      return { ok: false, erro: "Senha incorreta." };
    }
  }

  function bloquear() {
    setSenhaAtual("");
    setUnlocked(false);
  }

  async function apagarTudoEComecarDeNovo() {
    await backendSet("");
    setLivros([]);
    setEmprestimos([]);
    setPessoas([]);
    setCobrancas([]);
    setConfig({ pix: "", recebedor: "" });
    setSenhaAtual("");
    setUnlocked(false);
    setTemDadosSalvos(false);
  }

  useEffect(() => {
    if (!loaded || !unlocked || !senhaAtual) return;
    setSaving(true);
    const t = setTimeout(async () => {
      try {
        const criptografado = await encryptJSON({ livros, emprestimos, pessoas, cobrancas, config }, senhaAtual);
        await backendSet(criptografado);
        setTemDadosSalvos(true);
        if (cloudConfig) {
          const emprestimosAtivos = emprestimos.filter((e) => !e.devolvido);
          const dadosPublicos = {
            bibliotecaNome: APP_NAME,
            whatsappContato: config.whatsappContato || "",
            livros: livros.map((l) => {
              const ativo = emprestimosAtivos.find((e) => e.livroId === l.id);
              return {
                id: l.id,
                titulo: l.titulo,
                autor: l.autor || "",
                capaUrl: l.capaUrl || null,
                disponivel: !ativo,
                proximaData: ativo ? ativo.prazo : null,
              };
            }),
          };
          await nuvemSalvarPublico(cloudConfig, cloudDocId, dadosPublicos);
        }
        setCloudStatus(cloudConfig ? "sincronizada" : "desligada");
      } catch (e) {
        console.error("Erro ao salvar:", e);
        setCloudStatus(cloudConfig ? "erro" : "desligada");
      }
      setSaving(false);
    }, 400);
    return () => clearTimeout(t);
  }, [livros, emprestimos, pessoas, cobrancas, config, loaded, unlocked, senhaAtual, cloudConfig, cloudDocId]);

  function livroById(id) {
    return livros.find((l) => l.id === id);
  }
  function pessoaById(id) {
    return pessoas.find((p) => p.id === id);
  }
  function pessoaPorNomeCompleto(nomeFull) {
    return pessoas.find((p) => nomeCompleto(p).toLowerCase() === (nomeFull || "").trim().toLowerCase());
  }

  function statusOf(emp) {
    if (emp.devolvido) return "devolvido";
    if (emp.prazo && daysBetween(emp.prazo) > 0) return "atrasado";
    return "emprestado";
  }

  function totalPago(emp) {
    return (emp.pagamentos || []).reduce((s, p) => s + p.valor, 0);
  }

  // ---- Ações: Livros ----
  function addLivro(dados) {
    if (!dados.titulo.trim()) return;
    setLivros((prev) => [
      ...prev,
      {
        id: uid(),
        titulo: dados.titulo.trim(),
        autor: (dados.autor || "").trim(),
        paginas: dados.paginas ? parseInt(dados.paginas, 10) : null,
        dataAquisicao: dados.dataAquisicao || null,
        capaUrl: dados.capaUrl || null,
      },
    ]);
  }

  function editarLivro(id, dados) {
    setLivros((prev) =>
      prev.map((l) =>
        l.id === id
          ? {
              ...l,
              titulo: dados.titulo.trim(),
              autor: (dados.autor || "").trim(),
              paginas: dados.paginas ? parseInt(dados.paginas, 10) : null,
              dataAquisicao: dados.dataAquisicao || null,
              capaUrl: dados.capaUrl || null,
            }
          : l
      )
    );
  }

  function removeLivro(id) {
    if (emprestimos.some((e) => e.livroId === id && !e.devolvido)) {
      alert("Este livro está emprestado. Marque como devolvido antes de remover.");
      return;
    }
    setLivros((prev) => prev.filter((l) => l.id !== id));
  }

  // ---- Ações: Pessoas ----
  function upsertPessoa(dados, id) {
    setPessoas((prev) => {
      if (id) return prev.map((p) => (p.id === id ? { ...p, ...dados } : p));
      // evita duplicar se já existe alguém com o mesmo nome completo
      const existente = prev.find(
        (p) => nomeCompleto(p).toLowerCase() === nomeCompleto(dados).toLowerCase()
      );
      if (existente) return prev.map((p) => (p.id === existente.id ? { ...p, ...dados } : p));
      return [...prev, { id: uid(), nome: "", sobrenome: "", telefone: "", email: "", ...dados }];
    });
  }
  function removePessoa(id) {
    setPessoas((prev) => prev.filter((p) => p.id !== id));
  }

  // ---- Ações: Empréstimos ----
  function addEmprestimo(data) {
    let pessoaId = data.pessoaId;
    if (!pessoaId && data.pessoaNovaNome) {
      pessoaId = uid();
      setPessoas((prev) => [
        ...prev,
        {
          id: pessoaId,
          nome: data.pessoaNovaNome.trim(),
          sobrenome: (data.pessoaNovaSobrenome || "").trim(),
          telefone: data.telefone || "",
          email: "",
        },
      ]);
    }
    setEmprestimos((prev) => [
      {
        id: uid(),
        livroId: data.livroId,
        pessoaId,
        dataEmprestimo: todayISO(),
        prazo: data.prazo || null,
        valorCombinado: parseFloat(data.valorCombinado) || 0,
        pagamentos: [],
        devolvido: false,
        dataDevolucao: null,
      },
      ...prev,
    ]);
  }

  function marcarDevolvido(id) {
    setEmprestimos((prev) =>
      prev.map((e) => (e.id === id ? { ...e, devolvido: true, dataDevolucao: todayISO() } : e))
    );
  }

  function addPagamento(id, valor) {
    const v = parseFloat(valor);
    if (!v || v <= 0) return;
    setEmprestimos((prev) =>
      prev.map((e) =>
        e.id === id
          ? { ...e, pagamentos: [...(e.pagamentos || []), { valor: v, data: todayISO() }] }
          : e
      )
    );
  }

  function removeEmprestimo(id) {
    setEmprestimos((prev) => prev.filter((e) => e.id !== id));
  }

  // ---- Ações: Cobranças (fica registrado sempre que uma cobrança/lembrete é enviado) ----
  function registrarCobranca(emprestimoId, tipo, valor) {
    setCobrancas((prev) => [{ id: uid(), emprestimoId, tipo, valor: valor || 0, data: todayISO() }, ...prev]);
  }

  if (!loaded) {
    return (
      <div
        style={{
          minHeight: "100vh",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          background: COLORS.cream,
          fontFamily: "'Source Serif 4', serif",
          color: COLORS.inkSoft,
        }}
      >
        Abrindo o catálogo…
      </div>
    );
  }

  if (!unlocked) {
    return (
      <TelaSenha
        temDadosSalvos={temDadosSalvos}

// ---------------- Empréstimos ----------------
function EmprestimosTab({
  livros,
  emprestimos,
  pessoas,
  pessoaById,
  statusOf,
  totalPago,
  livroById,
  config,
  onAdd,
  onDevolver,
  onPagar,
  onRemover,
  onRegistrarCobranca,
}) {
  const [showForm, setShowForm] = useState(false);
  const [livroId, setLivroId] = useState("");
  const [pessoaId, setPessoaId] = useState("");
  const [nomeNovo, setNomeNovo] = useState("");
  const [sobrenomeNovo, setSobrenomeNovo] = useState("");
  const [telefoneNovo, setTelefoneNovo] = useState("");
  const [valorCombinado, setValorCombinado] = useState("");
  const [prazo, setPrazo] = useState("");
  const [filtro, setFiltro] = useState("ativos");
  const [pagamentoInputs, setPagamentoInputs] = useState({});

  const livrosDisponiveis = livros.filter(
    (l) => !emprestimos.some((e) => e.livroId === l.id && !e.devolvido)
  );

  function submit() {
    if (!livroId || (!pessoaId && !nomeNovo.trim())) {
      alert("Escolha um livro e quem está pegando.");
      return;
    }
    onAdd({
      livroId,
      pessoaId: pessoaId || null,
      pessoaNovaNome: pessoaId ? null : nomeNovo,
      pessoaNovaSobrenome: pessoaId ? null : sobrenomeNovo,
      telefone: telefoneNovo,
      valorCombinado,
      prazo,
    });
    setLivroId("");
    setPessoaId("");
    setNomeNovo("");
    setSobrenomeNovo("");
    setTelefoneNovo("");
    setValorCombinado("");
    setPrazo("");
    setShowForm(false);
  }

  function mensagemCobranca(emp, livro, pessoa) {
    const restante = Math.max(0, (emp.valorCombinado || 0) - totalPago(emp));
    let msg = `Oi ${pessoa ? pessoa.nome : ""}! 👋 Passando pra lembrar sobre o livro "${
      livro ? livro.titulo : ""
    }" que peguei emprestado com você — falta ${fmtMoney(restante)} do combinado.`;
    if (config.pix) {
      msg += ` Pix: ${config.pix}${config.recebedor ? " (" + config.recebedor + ")" : ""}.`;
    }
    msg += " Qualquer coisa me chama! 🙏";
    return msg;
  }

  function mensagemRenovacao(emp, livro, pessoa) {
    return `Oi ${pessoa ? pessoa.nome : ""}! 👋 Só passando pra saber sobre o livro "${
      livro ? livro.titulo : ""
    }" — o prazo era ${fmtDate(emp.prazo)}. Você já terminou ou quer renovar por mais um tempo? Me avisa 🙂`;
  }

  const lista = emprestimos.filter((e) => {
    if (filtro === "ativos") return !e.devolvido;
    if (filtro === "devolvidos") return e.devolvido;
    return true;
  });

  return (
    <div>
      <Section eyebrow="Registro de saída" title="Empréstimos ativos">
        <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
          {["ativos", "devolvidos", "todos"].map((f) => (
            <button
              key={f}
              onClick={() => setFiltro(f)}
              style={{
                fontFamily: "'JetBrains Mono', monospace",
                fontSize: 11,
                letterSpacing: 0.5,
                textTransform: "uppercase",
                padding: "6px 12px",
                borderRadius: 20,
                border: `1.5px solid ${filtro === f ? COLORS.burgundy : COLORS.rule}`,
                background: filtro === f ? COLORS.burgundy : "transparent",
                color: filtro === f ? "#fff" : COLORS.inkSoft,
                cursor: "pointer",
              }}
            >
              {f}
            </button>
          ))}
        </div>

        {!showForm && (
          <Button onClick={() => setShowForm(true)} style={{ marginBottom: 18 }}>
            + Novo empréstimo
          </Button>
        )}

        {showForm && (
          <div
            style={{
              background: COLORS.card,
              border: `1.5px solid ${COLORS.rule}`,
              borderRadius: 10,
              padding: 16,
              marginBottom: 20,
              display: "flex",
              flexDirection: "column",
              gap: 10,
            }}
          >
            <label style={labelStyle}>Livro</label>
            <select value={livroId} onChange={(e) => setLivroId(e.target.value)} style={inputBase}>
              <option value="">Selecione…</option>
              {livrosDisponiveis.map((l) => (
                <option key={l.id} value={l.id}>
                  {l.titulo} {l.autor ? `— ${l.autor}` : ""}
                </option>
              ))}
            </select>
            {livrosDisponiveis.length === 0 && (
              <div style={{ fontSize: 12, color: COLORS.rust }}>
                Nenhum livro disponível. Cadastre um no Acervo primeiro.
              </div>
            )}

            <label style={labelStyle}>Quem está pegando</label>
            <select
              value={pessoaId}
              onChange={(e) => setPessoaId(e.target.value)}
              style={inputBase}
            >
              <option value="">+ Pessoa nova…</option>
              {pessoas.map((p) => (
                <option key={p.id} value={p.id}>
                  {nomeCompleto(p)}
                </option>
              ))}
            </select>

            {!pessoaId && (
              <div style={{ display: "flex", gap: 8 }}>
                <Input placeholder="Nome" value={nomeNovo} onChange={(e) => setNomeNovo(e.target.value)} />
                <Input placeholder="Sobrenome" value={sobrenomeNovo} onChange={(e) => setSobrenomeNovo(e.target.value)} />
              </div>
            )}
            {!pessoaId && (
              <>
                <label style={labelStyle}>Celular (com DDD) — pra poder cobrar depois</label>
                <Input value={telefoneNovo} onChange={(e) => setTelefoneNovo(e.target.value)} placeholder="(11) 91234-5678" />
              </>
            )}

            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <label style={labelStyle}>Valor combinado (R$)</label>
                <Input
                  type="number"
                  step="0.01"
                  value={valorCombinado}
                  onChange={(e) => setValorCombinado(e.target.value)}
                  placeholder="0,00"
                />
              </div>
              <div style={{ flex: 1 }}>
                <label style={labelStyle}>Prazo de devolução</label>
                <Input type="date" value={prazo} onChange={(e) => setPrazo(e.target.value)} />
              </div>
            </div>

            <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
              <Button onClick={submit}>Registrar</Button>
              <Button variant="ghost" onClick={() => setShowForm(false)}>
                Cancelar
              </Button>
            </div>
          </div>
        )}

        {lista.length === 0 && <EmptyState text="Nada por aqui ainda. Registre o primeiro empréstimo acima." />}

        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {lista.map((emp) => {
            const livro = livroById(emp.livroId);
            const pessoa = pessoaById(emp.pessoaId);
            const pago = totalPago(emp);
            const restante = Math.max(0, (emp.valorCombinado || 0) - pago);
            return (
              <div
                key={emp.id}
                style={{
                  background: COLORS.card,
                  border: `1.5px solid ${COLORS.rule}`,
                  borderRadius: 10,
                  padding: 16,
                  display: "flex",
                  gap: 14,
                }}
              >
                <Stamp status={statusOf(emp)} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 17 }}>
                    {livro ? livro.titulo : "(livro removido)"}
                  </div>
                  <div style={{ fontSize: 13, color: COLORS.inkSoft, marginBottom: 6 }}>
                    com {pessoa ? nomeCompleto(pessoa) : "(pessoa removida)"} · desde {fmtDate(emp.dataEmprestimo)}
                    {emp.prazo ? ` · prazo ${fmtDate(emp.prazo)}` : ""}
                  </div>

                  <div
                    style={{
                      fontFamily: "'JetBrains Mono', monospace",
                      fontSize: 13,
                      display: "flex",
                      gap: 14,
                      flexWrap: "wrap",
                      marginBottom: 8,
                    }}
                  >
                    <span>combinado: {fmtMoney(emp.valorCombinado)}</span>
                    <span style={{ color: COLORS.sage }}>pago: {fmtMoney(pago)}</span>
                    {restante > 0 && <span style={{ color: COLORS.rust }}>falta: {fmtMoney(restante)}</span>}
                  </div>

                  {!emp.devolvido && (
                    <>
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", marginBottom: 8 }}>
                        <Input
                          type="number"
                          step="0.01"
                          placeholder="valor pago"
                          value={pagamentoInputs[emp.id] || ""}
                          onChange={(e) => setPagamentoInputs((p) => ({ ...p, [emp.id]: e.target.value }))}
                          style={{ width: 110, padding: "7px 10px", fontSize: 13 }}
                        />
                        <Button
                          variant="subtle"
                          style={{ padding: "7px 12px", fontSize: 13 }}
                          onClick={() => {
                            onPagar(emp.id, pagamentoInputs[emp.id]);
                            setPagamentoInputs((p) => ({ ...p, [emp.id]: "" }));
                          }}
                        >
                          Registrar pagamento
                        </Button>
                        <Button variant="ghost" style={{ padding: "7px 12px", fontSize: 13 }} onClick={() => onDevolver(emp.id)}>
                          Marcar devolvido
                        </Button>
                      </div>

                      {pessoa && pessoa.telefone ? (
                        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                          {restante > 0 && (
                            <a
                              href={linkWhatsApp(pessoa.telefone, mensagemCobranca(emp, livro, pessoa))}
                              target="_blank"
                              rel="noreferrer"
                              onClick={() => onRegistrarCobranca(emp.id, "cobranca", restante)}
                            >
                              <Button variant="whats" style={{ padding: "7px 12px", fontSize: 13 }}>
                                💬 Cobrar via WhatsApp
                              </Button>
                            </a>
                          )}
                          <a
                            href={linkWhatsApp(pessoa.telefone, mensagemRenovacao(emp, livro, pessoa))}
                            target="_blank"
                            rel="noreferrer"
                            onClick={() => onRegistrarCobranca(emp.id, "lembrete", 0)}
                          >
                            <Button variant="subtle" style={{ padding: "7px 12px", fontSize: 13 }}>
                              💬 Lembrar prazo
                            </Button>
                          </a>
                          <a
                            href={linkSMS(pessoa.telefone, mensagemCobranca(emp, livro, pessoa))}
                            onClick={() => onRegistrarCobranca(emp.id, "sms", restante)}
                          >
                            <Button variant="subtle" style={{ padding: "7px 12px", fontSize: 13 }}>
                              ✉️ SMS
                            </Button>
                          </a>
                        </div>
                      ) : (
                        <div style={{ fontSize: 12, color: COLORS.inkSoft }}>
                          Cadastre o celular {pessoa ? "de " + pessoa.nome : "dessa pessoa"} na aba Pessoas pra poder cobrar por WhatsApp.
                        </div>
                      )}
                    </>
                  )}
                  {emp.devolvido && (
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <span style={{ fontSize: 12, color: COLORS.inkSoft }}>devolvido em {fmtDate(emp.dataDevolucao)}</span>
                      <button
                        onClick={() => onRemover(emp.id)}
                        style={{
                          marginLeft: "auto",
                          background: "none",
                          border: "none",
                          color: COLORS.rust,
                          fontSize: 12,
                          cursor: "pointer",
                          textDecoration: "underline",
                        }}
                      >
                        remover registro
                      </button>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </Section>
    </div>
  );
}

async function buscarCapaGoogleBooks(titulo, autor) {
  const q = encodeURIComponent(`intitle:${titulo}${autor ? " inauthor:" + autor : ""}`);
  const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1`);
  const data = await res.json();
  const link = data?.items?.[0]?.volumeInfo?.imageLinks?.thumbnail;
  return link ? link.replace("http://", "https://") : null;
}

function AcervoTab({ livros, emprestimos, onAdd, onEdit, onRemove }) {
  const [titulo, setTitulo] = useState("");
  const [autor, setAutor] = useState("");
  const [paginas, setPaginas] = useState("");
  const [dataAquisicao, setDataAquisicao] = useState("");
  const [capaUrl, setCapaUrl] = useState("");
  const [buscandoCapa, setBuscandoCapa] = useState(false);
  const [editandoId, setEditandoId] = useState(null);
  const [editTitulo, setEditTitulo] = useState("");
  const [editAutor, setEditAutor] = useState("");
  const [editPaginas, setEditPaginas] = useState("");
  const [editData, setEditData] = useState("");
  const [editCapaUrl, setEditCapaUrl] = useState("");
  const [buscandoCapaEdit, setBuscandoCapaEdit] = useState(false);

  async function buscarCapaNovo() {
    if (!titulo.trim()) return;
    setBuscandoCapa(true);
    const link = await buscarCapaGoogleBooks(titulo, autor).catch(() => null);
    if (link) setCapaUrl(link);
    setBuscandoCapa(false);
  }
  async function buscarCapaEditar() {
    if (!editTitulo.trim()) return;
    setBuscandoCapaEdit(true);
    const link = await buscarCapaGoogleBooks(editTitulo, editAutor).catch(() => null);
    if (link) setEditCapaUrl(link);
    setBuscandoCapaEdit(false);
  }

  function abrirEdicao(l) {
    setEditandoId(l.id);
    setEditTitulo(l.titulo);
    setEditAutor(l.autor || "");
    setEditPaginas(l.paginas || "");
    setEditData(l.dataAquisicao || "");
    setEditCapaUrl(l.capaUrl || "");
  }
  function salvarEdicao() {
    onEdit(editandoId, {
      titulo: editTitulo,
      autor: editAutor,
      paginas: editPaginas,
      dataAquisicao: editData,
      capaUrl: editCapaUrl,
    });
    setEditandoId(null);
  }

  return (
    <Section eyebrow="Catálogo" title="Acervo">
      <div
        style={{
          background: COLORS.card,
          border: `1.5px solid ${COLORS.rule}`,
          borderRadius: 10,
          padding: 16,
          marginBottom: 20,
          display: "flex",
          flexDirection: "column",
          gap: 8,
        }}
      >
        <label style={labelStyle}>Cadastrar livro</label>

          <Input placeholder="Título" value={titulo} onChange={(e) => setTitulo(e.target.value)} style={{ flex: "2 1 160px" }} />
          <Input placeholder="Autor (opcional)" value={autor} onChange={(e) => setAutor(e.target.value)} style={{ flex: "2 1 140px" }} />
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <Input
            type="number"
            placeholder="Páginas"
            value={paginas}
            onChange={(e) => setPaginas(e.target.value)}
            style={{ flex: "1 1 110px" }}
          />
          <div style={{ flex: "1 1 160px" }}>
            <label style={{ ...labelStyle, marginBottom: 2, display: "block" }}>Dia de aquisição</label>
            <Input type="date" value={dataAquisicao} onChange={(e) => setDataAquisicao(e.target.value)} />
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <Input
            placeholder="Link da capa (opcional)"
            value={capaUrl}
            onChange={(e) => setCapaUrl(e.target.value)}
            style={{ flex: 1 }}
          />
          {capaUrl && (
            <img src={capaUrl} alt="" style={{ width: 34, height: 48, objectFit: "cover", borderRadius: 3, border: `1px solid ${COLORS.rule}` }} />
          )}
          <Button variant="subtle" style={{ padding: "9px 12px", fontSize: 13, whiteSpace: "nowrap" }} onClick={buscarCapaNovo} disabled={buscandoCapa}>
            {buscandoCapa ? "buscando…" : "🔍 buscar capa"}
          </Button>
        </div>
        <Button
          style={{ alignSelf: "flex-start" }}
          onClick={() => {
            onAdd({ titulo, autor, paginas, dataAquisicao, capaUrl });
            setTitulo("");
            setAutor("");
            setPaginas("");
            setDataAquisicao("");
            setCapaUrl("");
          }}
        >
          Adicionar ao acervo
        </Button>
      </div>

      {livros.length === 0 && <EmptyState text="Nenhum livro cadastrado ainda." />}

      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {livros.map((l) => {
          const emprestado = emprestimos.some((e) => e.livroId === l.id && !e.devolvido);
          const editando = editandoId === l.id;
          return (
            <div
              key={l.id}
              style={{
                background: COLORS.card,
                border: `1.5px solid ${COLORS.rule}`,
                borderRadius: 8,
                padding: "12px 14px",
              }}
            >
              {editando ? (
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                    <Input value={editTitulo} onChange={(e) => setEditTitulo(e.target.value)} style={{ flex: "2 1 140px" }} placeholder="Título" />
                    <Input value={editAutor} onChange={(e) => setEditAutor(e.target.value)} style={{ flex: "2 1 120px" }} placeholder="Autor" />
                  </div>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                    <Input type="number" value={editPaginas} onChange={(e) => setEditPaginas(e.target.value)} style={{ flex: "1 1 100px" }} placeholder="Páginas" />
                    <Input type="date" value={editData} onChange={(e) => setEditData(e.target.value)} style={{ flex: "1 1 140px" }} />
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <Input placeholder="Link da capa" value={editCapaUrl} onChange={(e) => setEditCapaUrl(e.target.value)} style={{ flex: 1 }} />

                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <Button style={{ padding: "7px 12px", fontSize: 13 }} onClick={salvarEdicao}>

                        borderRadius: 4,

                        flexShrink: 0,
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        fontSize: 16,
                        opacity: 0.4,

                      📕
                    </div>
                  )}

                    <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 600, fontSize: 16 }}>{l.titulo}</div>
                    {l.autor && <div style={{ fontSize: 13, color: COLORS.inkSoft }}>{l.autor}</div>}
                    <div style={{ fontSize: 11.5, color: COLORS.inkSoft, fontFamily: "'JetBrains Mono', monospace", marginTop: 2 }}>
                      {l.paginas ? `${l.paginas} páginas` : ""}
                      {l.paginas && l.dataAquisicao ? " · " : ""}
                      {l.dataAquisicao ? `adquirido em ${fmtDate(l.dataAquisicao)}` : ""}
                    </div>

                  <span
                    style={{
                      fontFamily: "'JetBrains Mono', monospace",
                      fontSize: 10.5,
                      letterSpacing: 0.5,
                      padding: "4px 8px",
                      borderRadius: 12,

                      border: `1px solid ${emprestado ? COLORS.burgundy : COLORS.sage}`,
                      whiteSpace: "nowrap",
                    }}
                  >
                    {emprestado ? "FORA" : "NA PRATELEIRA"}
                  </span>
                  <button
                    onClick={() => abrirEdicao(l)}
                    style={{ background: "none", border: "none", color: COLORS.burgundy, cursor: "pointer", fontSize: 13, textDecoration: "underline" }}

                    editar

        })}
      </div>
    </Section>
  );
}

// ---------------- Pessoas ----------------
function PessoasTab({ pessoas, emprestimos, livroById, totalPago, onUpsert, onRemove }) {
  const [novoNome, setNovoNome] = useState("");
  const [novoSobrenome, setNovoSobrenome] = useState("");
  const [novoTel, setNovoTel] = useState("");
  const [novoEmail, setNovoEmail] = useState("");
  const [editandoId, setEditandoId] = useState(null);
  const [editNome, setEditNome] = useState("");
  const [editSobrenome, setEditSobrenome] = useState("");
  const [editTel, setEditTel] = useState("");
  const [editEmail, setEditEmail] = useState("");

  const resumo = pessoas.map((p) => {
    const dela = emprestimos.filter((e) => e.pessoaId === p.id);
    const combinado = dela.reduce((s, e) => s + (e.valorCombinado || 0), 0);
    const pago = dela.reduce((s, e) => s + totalPago(e), 0);
    const ativos = dela.filter((e) => !e.devolvido);
    return { pessoa: p, combinado, pago, saldo: combinado - pago, ativos };
  });

  function abrirEdicao(p) {
    setEditandoId(p.id);
    setEditNome(p.nome);
    setEditSobrenome(p.sobrenome || "");
    setEditTel(p.telefone || "");
    setEditEmail(p.email || "");
  }

  function salvarEdicao() {
    onUpsert({ nome: editNome, sobrenome: editSobrenome, telefone: editTel, email: editEmail }, editandoId);
    setEditandoId(null);
  }

  return (
    <Section eyebrow="Contas e contatos" title="Pessoas">
      <div
        style={{
          background: COLORS.card,
          border: `1.5px solid ${COLORS.rule}`,
          borderRadius: 10,
          padding: 16,
          marginBottom: 20,
          display: "flex",
          flexDirection: "column",
          gap: 8,
        }}
      >
        <label style={labelStyle}>Cadastrar pessoa</label>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <Input placeholder="Nome" value={novoNome} onChange={(e) => setNovoNome(e.target.value)} style={{ flex: "1 1 120px" }} />
          <Input placeholder="Sobrenome" value={novoSobrenome} onChange={(e) => setNovoSobrenome(e.target.value)} style={{ flex: "1 1 120px" }} />
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <Input placeholder="Celular com DDD" value={novoTel} onChange={(e) => setNovoTel(e.target.value)} style={{ flex: "1 1 140px" }} />
          <Input placeholder="E-mail (opcional)" value={novoEmail} onChange={(e) => setNovoEmail(e.target.value)} style={{ flex: "1 1 140px" }} />
        </div>
        <Button
          style={{ alignSelf: "flex-start" }}
          onClick={() => {
            if (!novoNome.trim()) return;
            onUpsert({ nome: novoNome.trim(), sobrenome: novoSobrenome.trim(), telefone: novoTel, email: novoEmail });
            setNovoNome("");
            setNovoSobrenome("");
            setNovoTel("");
            setNovoEmail("");
          }}
        >
          Salvar pessoa
        </Button>
      </div>

      {resumo.length === 0 && <EmptyState text="Ninguém cadastrado ainda." />}
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {resumo.map(({ pessoa: p, combinado, pago, saldo, ativos }) => (
          <div key={p.id} style={{ background: COLORS.card, border: `1.5px solid ${COLORS.rule}`, borderRadius: 10, padding: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
              <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 17 }}>{nomeCompleto(p)}</div>
              {saldo !== 0 && (
                <div
                  style={{
                    fontFamily: "'JetBrains Mono', monospace",
                    fontSize: 13,
                    color: saldo > 0 ? COLORS.rust : COLORS.sage,
                    fontWeight: 600,
                  }}
                >
                  {saldo > 0 ? `deve ${fmtMoney(saldo)}` : "em dia"}
                </div>
              )}
            </div>
            <div style={{ fontSize: 12, color: COLORS.inkSoft, marginTop: 2 }}>{ativos.length} livro(s) com ela agora</div>
            {ativos.length > 0 && (
              <ul style={{ margin: "8px 0 0", paddingLeft: 18, fontSize: 13.5 }}>
                {ativos.map((e) => {
                  const l = livroById(e.livroId);
                  return <li key={e.id}>{l ? l.titulo : "(livro removido)"}</li>;
                })}
              </ul>
            )}

            {editandoId === p.id ? (
              <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 8 }}>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <Input placeholder="Nome" value={editNome} onChange={(e) => setEditNome(e.target.value)} style={{ flex: "1 1 120px", padding: "7px 10px", fontSize: 13 }} />
                  <Input placeholder="Sobrenome" value={editSobrenome} onChange={(e) => setEditSobrenome(e.target.value)} style={{ flex: "1 1 120px", padding: "7px 10px", fontSize: 13 }} />
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <Input placeholder="Celular" value={editTel} onChange={(e) => setEditTel(e.target.value)} style={{ flex: "1 1 130px", padding: "7px 10px", fontSize: 13 }} />
                  <Input placeholder="E-mail" value={editEmail} onChange={(e) => setEditEmail(e.target.value)} style={{ flex: "1 1 130px", padding: "7px 10px", fontSize: 13 }} />
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <Button style={{ padding: "7px 12px", fontSize: 13 }} onClick={salvarEdicao}>
                    Salvar
                  </Button>
                  <Button variant="ghost" style={{ padding: "7px 12px", fontSize: 13 }} onClick={() => setEditandoId(null)}>
                    Cancelar
                  </Button>
                  <button
                    onClick={() => onRemove(p.id)}
                    style={{ marginLeft: "auto", background: "none", border: "none", color: COLORS.rust, fontSize: 12.5, cursor: "pointer", textDecoration: "underline" }}
                  >
                    remover pessoa
                  </button>
                </div>
              </div>
            ) : (
              <div style={{ marginTop: 10, display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
                <span style={{ fontSize: 13, color: COLORS.inkSoft, fontFamily: "'JetBrains Mono', monospace" }}>
                  {p.telefone ? p.telefone : "sem celular"}
                  {p.email ? ` · ${p.email}` : ""}
                </span>
                <button
                  onClick={() => abrirEdicao(p)}
                  style={{ background: "none", border: "none", color: COLORS.burgundy, cursor: "pointer", fontSize: 13, textDecoration: "underline" }}
                >
                  editar contato
                </button>
              </div>
            )}
          </div>
        ))}
      </div>
    </Section>
  );
}

// ---------------- Financeiro ----------------
function FinanceiroTab({ emprestimos, cobrancas, pessoaById, livroById, totalPago }) {
  const totalCombinado = emprestimos.reduce((s, e) => s + (e.valorCombinado || 0), 0);
  const totalRecebido = emprestimos.reduce((s, e) => s + totalPago(e), 0);
  const totalPendente = Math.max(0, totalCombinado - totalRecebido);

  const pagamentos = emprestimos
    .flatMap((e) => (e.pagamentos || []).map((p) => ({ ...p, emprestimo: e })))
    .sort((a, b) => (a.data < b.data ? 1 : -1));

  const cobrancasOrdenadas = [...cobrancas].sort((a, b) => (a.data < b.data ? 1 : -1));

  const rotuloTipo = { cobranca: "cobrança enviada", lembrete: "lembrete de prazo", sms: "cobrança por SMS" };

  return (
    <div>
      <Section eyebrow="Caixa" title="Financeiro">
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 24 }}>
          {[
            { label: "combinado (todos)", valor: totalCombinado, cor: COLORS.ink },
            { label: "recebido", valor: totalRecebido, cor: COLORS.sage },
            { label: "pendente", valor: totalPendente, cor: COLORS.rust },
          ].map((c) => (
            <div
              key={c.label}
              style={{
                flex: "1 1 140px",
                background: COLORS.card,
                border: `1.5px solid ${COLORS.rule}`,
                borderRadius: 10,
                padding: "14px 16px",
              }}
            >
              <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5, color: COLORS.inkSoft, fontFamily: "'JetBrains Mono', monospace" }}>
                {c.label}
              </div>
              <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 20, color: c.cor }}>
                {fmtMoney(c.valor)}
              </div>
            </div>
          ))}
        </div>
      </Section>

      <Section eyebrow="Histórico" title="Pagamentos recebidos">
        {pagamentos.length === 0 && <EmptyState text="Nenhum pagamento registrado ainda." />}
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {pagamentos.map((p, i) => {
            const pessoa = pessoaById(p.emprestimo.pessoaId);
            const livro = livroById(p.emprestimo.livroId);
            return (
              <div
                key={i}
                style={{
                  background: COLORS.card,
                  border: `1px solid ${COLORS.rule}`,
                  borderRadius: 8,
                  padding: "10px 14px",
                  display: "flex",
                  justifyContent: "space-between",
                  fontSize: 13.5,
                  gap: 10,
                }}
              >
                <div>
                  <b>{pessoa ? nomeCompleto(pessoa) : "(pessoa removida)"}</b> · {livro ? livro.titulo : "(livro removido)"}
                  <div style={{ fontSize: 11.5, color: COLORS.inkSoft }}>{fmtDate(p.data)}</div>
                </div>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.sage, fontWeight: 600 }}>
                  +{fmtMoney(p.valor)}
                </div>
              </div>
            );
          })}
        </div>
      </Section>

      <Section eyebrow="Histórico" title="Cobranças enviadas">
        {cobrancasOrdenadas.length === 0 && <EmptyState text="Nenhuma cobrança enviada ainda." />}
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {cobrancasOrdenadas.map((c) => {
            const emp = emprestimos.find((e) => e.id === c.emprestimoId);
            const pessoa = emp ? pessoaById(emp.pessoaId) : null;
            const livro = emp ? livroById(emp.livroId) : null;
            return (
              <div
                key={c.id}
                style={{
                  background: COLORS.card,
                  border: `1px solid ${COLORS.rule}`,
                  borderRadius: 8,
                  padding: "10px 14px",
                  display: "flex",
                  justifyContent: "space-between",
                  fontSize: 13.5,
                  gap: 10,
                }}
              >
                <div>
                  <b>{pessoa ? nomeCompleto(pessoa) : "(pessoa removida)"}</b> · {livro ? livro.titulo : "(livro removido)"}
                  <div style={{ fontSize: 11.5, color: COLORS.inkSoft }}>
                    {rotuloTipo[c.tipo] || c.tipo} · {fmtDate(c.data)}
                  </div>
                </div>
                {c.valor > 0 && (
                  <div style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.gold, fontWeight: 600 }}>
                    {fmtMoney(c.valor)}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </Section>
    </div>
  );
}

// ---------------- Ajustes ----------------
function AjustesTab({ config, onChange, cloudConfig, cloudStatus, onConfigurarNuvem, onDesligarNuvem }) {
  const [pix, setPix] = useState(config.pix || "");
  const [recebedor, setRecebedor] = useState(config.recebedor || "");
  const [whatsappContato, setWhatsappContato] = useState(config.whatsappContato || "");
  const [colado, setColado] = useState("");
  const [docId, setDocId] = useState(cloudConfig?.docId || "principal");
  const [erroNuvem, setErroNuvem] = useState("");

  function ativarNuvem() {
    setErroNuvem("");
    try {
      // aceita colar "const firebaseConfig = {...};" ou só o objeto {...}
      const texto = colado.replace(/const\s+firebaseConfig\s*=\s*/, "").replace(/;\s*$/, "");
      const obj = new Function("return (" + texto + ")")();
      if (!obj.apiKey || !obj.projectId) throw new Error("faltam campos");
      onConfigurarNuvem(obj, docId || "principal");
    } catch (e) {
      setErroNuvem("Não consegui ler essa configuração. Confere se colou o bloco inteiro do Firebase.");
    }
  }

  const statusLabel = {
    desligada: { texto: "desligada — salvando só neste aparelho", cor: COLORS.inkSoft },
    conectando: { texto: "conectando…", cor: COLORS.gold },
    sincronizada: { texto: "sincronizada com a nuvem ✓", cor: COLORS.sage },
    erro: { texto: "erro ao conectar — confere a configuração", cor: COLORS.rust },
  }[cloudStatus];

  return (
    <Section eyebrow="Cobrança" title="Ajustes">
      <div
        style={{
          background: COLORS.card,
          border: `1.5px solid ${COLORS.rule}`,
          borderRadius: 10,
          padding: 16,
          display: "flex",
          flexDirection: "column",
          gap: 10,
        }}
      >
        <label style={labelStyle}>Chave Pix (aparece nas mensagens de cobrança)</label>
        <Input value={pix} onChange={(e) => setPix(e.target.value)} placeholder="ex: seuemail@email.com ou telefone" />
        <label style={labelStyle}>Nome do recebedor (opcional)</label>
        <Input value={recebedor} onChange={(e) => setRecebedor(e.target.value)} placeholder="ex: Weigler" />
        <label style={labelStyle}>Seu WhatsApp (usado na vitrine pública, pra reservas)</label>
        <Input value={whatsappContato} onChange={(e) => setWhatsappContato(e.target.value)} placeholder="(11) 91234-5678" />
        <Button style={{ alignSelf: "flex-start" }} onClick={() => onChange({ pix, recebedor, whatsappContato })}>
          Salvar
        </Button>
      </div>

      {cloudConfig && (
        <div
          style={{
            background: COLORS.card,
            border: `1.5px solid ${COLORS.rule}`,
            borderRadius: 10,
            padding: 16,
            marginTop: 16,
            display: "flex",
            flexDirection: "column",
            gap: 8,
          }}
        >
          <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 16 }}>
            Vitrine pública
          </div>
          <div style={{ fontSize: 12.5, color: COLORS.inkSoft }}>
            Página separada, sem senha, onde qualquer pessoa vê os livros disponíveis e pede reserva pelo seu WhatsApp.
            Ela atualiza sozinha sempre que você mexe no acervo.
          </div>
          <div style={{ fontSize: 12.5, color: COLORS.inkSoft }}>
            Código da biblioteca pra colar no arquivo <code>catalogo.html</code>: <b>{cloudConfig.docId}</b>
          </div>
        </div>
      )}

      <div
        style={{
          background: COLORS.card,
          border: `1.5px solid ${COLORS.rule}`,
          borderRadius: 10,
          padding: 16,
          marginTop: 16,
          display: "flex",
          flexDirection: "column",
          gap: 10,
        }}
      >
        <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 16 }}>
          Sincronização entre aparelhos
        </div>
        <div style={{ fontSize: 12.5, fontFamily: "'JetBrains Mono', monospace", color: statusLabel.cor }}>
          {statusLabel.texto}
        </div>

        {!cloudConfig ? (
          <>
            <label style={labelStyle}>Cole aqui a configuração do Firebase (firebaseConfig)</label>
            <textarea
              value={colado}
              onChange={(e) => setColado(e.target.value)}
              placeholder={`const firebaseConfig = {\n  apiKey: "...",\n  projectId: "...",\n  ...\n};`}
              rows={6}
              style={{ ...inputBase, fontFamily: "'JetBrains Mono', monospace", fontSize: 12.5 }}
            />
            <label style={labelStyle}>Código da biblioteca (opcional, deixa "principal" se não souber)</label>
            <Input value={docId} onChange={(e) => setDocId(e.target.value)} placeholder="principal" />
            {erroNuvem && <div style={{ color: COLORS.rust, fontSize: 12.5 }}>{erroNuvem}</div>}
            <Button style={{ alignSelf: "flex-start" }} onClick={ativarNuvem}>
              Ativar sincronização
            </Button>
            <div style={{ fontSize: 12, color: COLORS.inkSoft }}>
              Repete esse mesmo passo (colando a mesma configuração e o mesmo código) nos outros aparelhos pra eles
              se conectarem à mesma biblioteca.
            </div>
          </>
        ) : (
          <>
            <div style={{ fontSize: 12.5, color: COLORS.inkSoft }}>
              Projeto: <b>{cloudConfig.projectId}</b> · código: <b>{cloudConfig.docId}</b>
            </div>
            <Button variant="ghost" style={{ alignSelf: "flex-start" }} onClick={onDesligarNuvem}>
              Desligar sincronização
            </Button>
          </>
        )}
      </div>
    </Section>
  );
}

// ---------------- Tela de senha ----------------
function TelaSenha({ temDadosSalvos, onDesbloquear, onApagarTudo }) {
  const [senha, setSenha] = useState("");
  const [confirmar, setConfirmar] = useState("");
  const [erro, setErro] = useState("");
  const [carregando, setCarregando] = useState(false);
  const [confirmandoReset, setConfirmandoReset] = useState(false);

  async function entrar() {
    setErro("");
    if (!senha) {
      setErro("Digite uma senha.");
      return;
    }
    if (!temDadosSalvos && senha !== confirmar) {
      setErro("As senhas não coincidem.");
      return;
    }
    if (!temDadosSalvos && senha.length < 4) {
      setErro("Use pelo menos 4 caracteres.");
      return;
    }
    setCarregando(true);
    const r = await onDesbloquear(senha);
    setCarregando(false);
    if (!r.ok) setErro(r.erro);
  }

  return (
    <div
      style={{
        minHeight: "100vh",
        background: COLORS.burgundyDark,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        padding: 20,
        fontFamily: "'Source Serif 4', serif",
      }}
    >
      <div
        style={{
          background: COLORS.card,
          borderRadius: 14,
          padding: 28,
          maxWidth: 340,
          width: "100%",
          boxShadow: "0 20px 50px rgba(0,0,0,0.35)",
        }}
      >
        <div style={{ textAlign: "center", marginBottom: 6 }}>
          <span style={{ fontSize: 30 }}>🔒</span>
        </div>
        <h1
          style={{
            fontFamily: "'Playfair Display', serif",
            fontStyle: "italic",
            fontSize: 26,
            textAlign: "center",
            margin: "0 0 4px",
            color: COLORS.ink,
          }}
        >
          Sifriyah
        </h1>
        <div style={{ textAlign: "center", fontSize: 13, color: COLORS.inkSoft, marginBottom: 20 }}>
          {temDadosSalvos ? "Digite a senha pra abrir" : "Crie uma senha pra proteger os dados"}
        </div>

        <Input
          type="password"
          placeholder="Senha"
          value={senha}
          onChange={(e) => setSenha(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && (temDadosSalvos ? entrar() : null)}
          style={{ marginBottom: 10 }}
          autoFocus
        />
        {!temDadosSalvos && (
          <Input
            type="password"
            placeholder="Confirme a senha"
            value={confirmar}
            onChange={(e) => setConfirmar(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && entrar()}
            style={{ marginBottom: 10 }}
          />
        )}

        {erro && <div style={{ color: COLORS.rust, fontSize: 13, marginBottom: 10 }}>{erro}</div>}

        <Button onClick={entrar} style={{ width: "100%" }} disabled={carregando}>
          {carregando ? "Abrindo…" : temDadosSalvos ? "Entrar" : "Criar e continuar"}
        </Button>

        {temDadosSalvos && !confirmandoReset && (
          <div style={{ textAlign: "center", marginTop: 14 }}>
            <button
              onClick={() => setConfirmandoReset(true)}
              style={{ background: "none", border: "none", color: COLORS.inkSoft, fontSize: 12, textDecoration: "underline", cursor: "pointer" }}
            >
              esqueci a senha
            </button>
          </div>
        )}
        {confirmandoReset && (
          <div style={{ marginTop: 14, textAlign: "center", fontSize: 12.5, color: COLORS.rust }}>
            Sem a senha não dá pra recuperar os dados. A única saída é apagar tudo e recomeçar do zero.
            <div style={{ marginTop: 8, display: "flex", gap: 8, justifyContent: "center" }}>
              <Button variant="ghost" style={{ padding: "6px 12px", fontSize: 12.5 }} onClick={() => setConfirmandoReset(false)}>
                Cancelar
              </Button>
              <Button variant="subtle" style={{ padding: "6px 12px", fontSize: 12.5, color: COLORS.rust }} onClick={onApagarTudo}>
                Apagar tudo
              </Button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function EmptyState({ text }) {
  return (
    <div style={{ border: `1.5px dashed ${COLORS.rule}`, borderRadius: 10, padding: "24px 16px", textAlign: "center", color: COLORS.inkSoft, fontSize: 14, marginBottom: 16 }}>

  );
}
