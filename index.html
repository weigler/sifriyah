        {tab === "acervo" && (
          <AcervoTab
            livros={livros}
            emprestimos={emprestimos}
            categorias={categorias}
            tags={tags}
            pessoas={pessoas}
            pessoaById={pessoaById}
            filas={filas}
            onAdd={addLivro}
            onEdit={editarLivro}
            onRemove={removeLivro}
            onAdicionarFila={adicionarNaFila}
            onRemoverFila={removerDaFila}
            onMoverFila={moverNaFila}
          />
        )}
        {tab === "categorias" && (
          <CategoriasTab
            categorias={categorias}
            tags={tags}
            onAddCategoria={addCategoria}
            onRemoverCategoria={removerCategoria}
            onAddTag={addTag}
            onRemoverTag={removerTag}
          />
        )}
        {tab === "pessoas" && (
          <PessoasTab
            pessoas={pessoas}
            emprestimos={emprestimos}
            livroById={livroById}
            totalPago={totalPago}
            onUpsert={upsertPessoa}
            onRemove={removePessoa}
            preCadastros={preCadastros}
            onImportarPreCadastro={importarPreCadastro}
            onDescartarPreCadastro={descartarPreCadastro}
          />
        )}
        {tab === "financeiro" && (
          <FinanceiroTab
            emprestimos={emprestimos}
            cobrancas={cobrancas}
            pessoaById={pessoaById}
            livroById={livroById}
            totalPago={totalPago}
            onRemoverCobranca={removerCobranca}
          />
        )}
        {tab === "ajustes" && (
          <AjustesTab
            config={config}
            onChange={setConfig}
            cloudConfig={cloudConfig}
            cloudStatus={cloudStatus}
            onConfigurarNuvem={configurarNuvem}
            onDesligarNuvem={desligarNuvem}
            ultimoSalvamento={ultimoSalvamento}
            ultimoBackup={ultimoBackup}
            backups={backups}
            carregandoBackups={carregandoBackups}
            fazendoBackup={fazendoBackup}
            onFazerBackup={handleFazerBackupManual}
            onAtualizarBackups={atualizarListaBackups}
            onRestaurarBackup={restaurarBackup}
            onApagarBackup={apagarBackup}
            semSenha={semSenha}
            onTrocarSenha={trocarSenha}
            onDesativarSenha={desativarSenha}
            onAtivarSenha={ativarSenha}
            adminEmail={adminEmail}
            statusAdminAuth={statusAdminAuth}
            onEntrarAdmin={entrarAdmin}
            onSairAdmin={sairAdmin}
          />
        )}
      </div>
    </div>
  );
}

// ---------------- Empréstimos ----------------
function EmprestimosTab({
  livros,
  emprestimos,
  pessoas,
  pessoaById,
  statusOf,
  totalPago,
  livroById,
  config,
  filas,
  onAdd,
  onDevolver,
  onRenovarSemana,
  onPagar,
  onRemoverPagamento,
  onRemover,
  onRegistrarCobranca,
}) {
  const [showForm, setShowForm] = useState(false);
  const [livroId, setLivroId] = useState("");
  const [pessoaId, setPessoaId] = useState("");
  const [nomeNovo, setNomeNovo] = useState("");
  const [sobrenomeNovo, setSobrenomeNovo] = useState("");
  const [telefoneNovo, setTelefoneNovo] = useState("");
  const [valorCombinado, setValorCombinado] = useState("");
  const [prazo, setPrazo] = useState("");
  const [filtro, setFiltro] = useState("ativos");
  const [pagamentoInputs, setPagamentoInputs] = useState({});
  const [erroForm, setErroForm] = useState("");

  function unidadesEmprestadas(livroId) {
    return emprestimos.filter((e) => e.livroId === livroId && !e.devolvido).length;
  }

  const livrosDisponiveis = livros.filter(
    (l) => unidadesEmprestadas(l.id) < (l.quantidade || 1)
  );

  // pessoas que já estão com algum livro emprestado agora (regra: 1 livro por pessoa por vez)
  const pessoasComEmprestimoAtivo = new Set(
    emprestimos.filter((e) => !e.devolvido).map((e) => e.pessoaId)
  );

  // auto-preenchimento: ao escolher o livro, sugere valor combinado (valor semanal x limite de
  // semanas, já com desconto da promoção ativa) e a data de devolução (hoje + limite de semanas)
  useEffect(() => {
    if (!livroId) return;
    const l = livroById(livroId);
    if (!l) return;
    const sugerido = calcularValorSugerido(l, config.promocao);
    if (sugerido !== null) setValorCombinado(String(sugerido));
    if (l.limiteSemanas) setPrazo(somarSemanas(todayISO(), l.limiteSemanas));
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [livroId]);

  function submit() {
    if (!livroId || (!pessoaId && !nomeNovo.trim())) {
      setErroForm("Escolha um livro e quem está pegando.");
      return;
    }
    if (!prazo) {
      setErroForm("A data de devolução é obrigatória.");
      return;
    }

    // regra: 1 livro por pessoa por vez
    let pessoaExistente = pessoaId ? pessoaById(pessoaId) : null;
    if (!pessoaId && nomeNovo.trim()) {
      pessoaExistente = pessoas.find(
        (p) => nomeCompleto(p).toLowerCase() === `${nomeNovo} ${sobrenomeNovo}`.trim().toLowerCase()
      );
    }
    if (pessoaExistente && pessoasComEmprestimoAtivo.has(pessoaExistente.id)) {
      setErroForm(`${nomeCompleto(pessoaExistente)} já está com um livro emprestado. Só é permitido um por vez.`);
      return;
    }

    setErroForm("");
    onAdd({
      livroId,
      pessoaId: pessoaId || null,
      pessoaNovaNome: pessoaId ? null : nomeNovo,
      pessoaNovaSobrenome: pessoaId ? null : sobrenomeNovo,
      telefone: telefoneNovo,
      valorCombinado,
      prazo,
    });
    setLivroId("");
    setPessoaId("");
    setNomeNovo("");
    setSobrenomeNovo("");
    setTelefoneNovo("");
    setValorCombinado("");
    setPrazo("");
    setShowForm(false);
  }

  function preencherModelo(modelo, dados) {
    return modelo
      .replace(/\{(\w+)\}/g, (_, k) => (dados[k] !== undefined && dados[k] !== null ? dados[k] : ""))
      .replace(/ {2,}/g, " ")
      .trim();
  }

  function mensagemCobranca(emp, livro, pessoa) {
    const restante = Math.max(0, (emp.valorCombinado || 0) - totalPago(emp));
    const pixTexto = config.pix ? `Pix: ${config.pix}${config.recebedor ? " (" + config.recebedor + ")" : ""}.` : "";
    const modelo =
      config.modeloCobranca ||
      `Oi {nome}! 👋 Passando pra lembrar sobre o livro "{livro}" que te emprestei — falta {valor} do combinado. {pix} Qualquer coisa me chama! 🙏`;
    return preencherModelo(modelo, {
      nome: pessoa ? pessoa.nome : "",
      livro: livro ? livro.titulo : "",
      valor: fmtMoney(restante),
      pix: pixTexto,
    });
  }

  function mensagemRenovacao(emp, livro, pessoa) {
    const modelo =
      config.modeloRenovacao ||
      `Oi {nome}! 👋 Só passando pra saber sobre o livro "{livro}" — o prazo era {prazo}. Você já terminou ou quer renovar por mais um tempo? Me avisa 🙂`;
    return preencherModelo(modelo, {
      nome: pessoa ? pessoa.nome : "",
      livro: livro ? livro.titulo : "",
      prazo: fmtDate(emp.prazo),
    });
  }

  const lista = emprestimos
    .filter((e) => {
      if (filtro === "ativos") return !e.devolvido;
      if (filtro === "devolvidos") return e.devolvido;
      return true;
    })
    .sort((a, b) => {
      const pa = statusOf(a) === "atrasado" ? 0 : 1;
      const pb = statusOf(b) === "atrasado" ? 0 : 1;
      return pa - pb;
    });

  const qtdAtrasados = emprestimos.filter((e) => !e.devolvido && statusOf(e) === "atrasado").length;

  return (
    <div>
      <Section eyebrow="Registro de saída" title="Empréstimos ativos">
        {qtdAtrasados > 0 && (
          <div
            style={{
              background: "#F7E3DA",
              border: `1.5px solid ${COLORS.rust}`,
              borderRadius: 8,
              padding: "10px 14px",
              marginBottom: 14,
              fontSize: 13,
              color: COLORS.rust,
              fontWeight: 600,
            }}
          >
            ⚠️ {qtdAtrasados} empréstimo(s) atrasado(s) — aparecem primeiro na lista abaixo.
          </div>
        )}
        <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
          {["ativos", "devolvidos", "todos"].map((f) => (
            <button
              key={f}
              onClick={() => setFiltro(f)}
              style={{
                fontFamily: "'JetBrains Mono', monospace",
                fontSize: 11,
                letterSpacing: 0.5,
                textTransform: "uppercase",
                padding: "6px 12px",
                borderRadius: 20,
                border: `1.5px solid ${filtro === f ? COLORS.burgundy : COLORS.rule}`,
                background: filtro === f ? COLORS.burgundy : "transparent",
                color: filtro === f ? "#fff" : COLORS.inkSoft,
                cursor: "pointer",
              }}
            >
              {f}
            </button>
          ))}
        </div>

        {!showForm && (
          <Button onClick={() => setShowForm(true)} style={{ marginBottom: 18 }}>
            + Novo empréstimo
          </Button>
        )}

        {showForm && (
          <div
            style={{
              background: COLORS.card,
              border: `1.5px solid ${COLORS.rule}`,
              borderRadius: 10,
              padding: 16,
              marginBottom: 20,
              display: "flex",
              flexDirection: "column",
              gap: 10,
            }}
          >
            {config.promocao?.ativa && config.promocao?.descricao && (
              <div
                style={{
                  background: "#FBF3DC",
                  border: `1px solid ${COLORS.gold}`,
                  borderRadius: 8,
                  padding: "8px 12px",
                  fontSize: 13,
                  color: COLORS.ink,
                }}
              >
                🎉 <b>Promoção ativa:</b> {config.promocao.descricao}
                {config.promocao.validoAte ? ` (até ${fmtDate(config.promocao.validoAte)})` : ""}
              </div>
            )}

            <label style={labelStyle}>Livro</label>
            <select value={livroId} onChange={(e) => setLivroId(e.target.value)} style={inputBase}>
              <option value="">Selecione…</option>
              {livrosDisponiveis.map((l) => {
                const qtd = l.quantidade || 1;
                const livres = qtd - unidadesEmprestadas(l.id);
                return (
                  <option key={l.id} value={l.id}>
                    {l.titulo} {l.autor ? `— ${l.autor}` : ""} {qtd > 1 ? `(${livres} de ${qtd} disponíveis)` : ""}
                  </option>
                );
              })}
            </select>
            {livrosDisponiveis.length === 0 && (
              <div style={{ fontSize: 12, color: COLORS.rust }}>
                Nenhum livro disponível. Cadastre um no Acervo primeiro.
              </div>
            )}
            {livroId && (() => {
              const l = livroById(livroId);
              if (!l || (!l.valorSemanal && !l.limiteSemanas)) return null;
              return (
                <div style={{ fontSize: 12.5, color: COLORS.inkSoft, fontFamily: "'JetBrains Mono', monospace" }}>
                  {l.valorSemanal ? `${fmtMoney(l.valorSemanal)}/semana` : ""}
                  {l.limiteSemanas ? ` · limite de ${l.limiteSemanas} semana(s)` : ""}
                  {l.valorSemanaExtra ? ` · ${fmtMoney(l.valorSemanaExtra)}/semana extra` : ""}
                </div>
              );
            })()}
            {livroId && (() => {
              const filaDoLivro = filas
                .filter((f) => f.livroId === livroId)
                .sort((a, b) => (a.ordem ?? a.criadoEm) - (b.ordem ?? b.criadoEm));
              if (filaDoLivro.length === 0) return null;
              const primeiro = pessoaById(filaDoLivro[0].pessoaId);
              return (
                <div style={{ fontSize: 12, color: COLORS.burgundy, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <span>
                    ⏳ {filaDoLivro.length} na fila — 1º: {primeiro ? nomeCompleto(primeiro) : "(pessoa removida)"}
                  </span>
                  {primeiro && (
                    <button
                      type="button"
                      onClick={() => setPessoaId(primeiro.id)}
                      style={{ background: "none", border: "none", color: COLORS.burgundy, textDecoration: "underline", cursor: "pointer", fontSize: 12 }}
                    >
                      usar esta pessoa
                    </button>
                  )}
                </div>
              );
            })()}

            <label style={labelStyle}>Quem está pegando</label>
            <select
              value={pessoaId}
              onChange={(e) => setPessoaId(e.target.value)}
              style={inputBase}
            >
              <option value="">+ Pessoa nova…</option>
              {pessoas.map((p) => (
                <option key={p.id} value={p.id} disabled={pessoasComEmprestimoAtivo.has(p.id)}>
                  {nomeCompleto(p)} {pessoasComEmprestimoAtivo.has(p.id) ? "— já com livro emprestado" : ""}
                </option>
              ))}
            </select>

            {!pessoaId && (
              <div style={{ display: "flex", gap: 8 }}>
                <Input placeholder="Nome" value={nomeNovo} onChange={(e) => setNomeNovo(e.target.value)} />
                <Input placeholder="Sobrenome" value={sobrenomeNovo} onChange={(e) => setSobrenomeNovo(e.target.value)} />
              </div>
            )}
            {!pessoaId && (
              <>
                <label style={labelStyle}>Celular (com DDD) — pra poder cobrar depois</label>
                <Input value={telefoneNovo} onChange={(e) => setTelefoneNovo(e.target.value)} placeholder="(11) 91234-5678" />
              </>
            )}

            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <label style={labelStyle}>Valor combinado (R$) — pode ser 0</label>
                <Input
                  type="number"
                  step="0.01"
                  min="0"
                  value={valorCombinado}
                  onChange={(e) => setValorCombinado(e.target.value)}
                  placeholder="0,00"
                />
              </div>
              <div style={{ flex: 1 }}>
                <label style={labelStyle}>Prazo de devolução *</label>
                <Input type="date" value={prazo} onChange={(e) => setPrazo(e.target.value)} required />
              </div>
            </div>

            {erroForm && <div style={{ fontSize: 12.5, color: COLORS.rust }}>{erroForm}</div>}
            <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
              <Button onClick={submit}>Registrar</Button>
              <Button variant="ghost" onClick={() => setShowForm(false)}>
                Cancelar
              </Button>
            </div>
          </div>
        )}

        {lista.length === 0 && <EmptyState text="Nada por aqui ainda. Registre o primeiro empréstimo acima." />}

        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {lista.map((emp) => {
            const livro = livroById(emp.livroId);
            const pessoa = pessoaById(emp.pessoaId);
            const pago = totalPago(emp);
            const restante = Math.max(0, (emp.valorCombinado || 0) - pago);
            const diasRestantes = !emp.devolvido && emp.prazo ? Math.max(0, -daysBetween(emp.prazo)) : 0;
            const semanasNaoUsadas = Math.floor(diasRestantes / 7);
            const descontoSugerido = livro && livro.valorSemanal ? semanasNaoUsadas * livro.valorSemanal : 0;
            return (
              <div
                key={emp.id}
                style={{
                  background: COLORS.card,
                  border: `1.5px solid ${COLORS.rule}`,
                  borderRadius: 10,
                  padding: 16,
                  display: "flex",
                  gap: 14,
                }}
              >
                <Stamp status={statusOf(emp)} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 17 }}>
                    {livro ? livro.titulo : "(livro removido)"}
                  </div>
                  <div style={{ fontSize: 13, color: COLORS.inkSoft, marginBottom: 6 }}>
                    com {pessoa ? nomeCompleto(pessoa) : "(pessoa removida)"} · desde {fmtDate(emp.dataEmprestimo)}
                    {emp.prazo ? ` · prazo ${fmtDate(emp.prazo)}` : ""}
                  </div>

                  <div
                    style={{
                      fontFamily: "'JetBrains Mono', monospace",
                      fontSize: 13,
                      display: "flex",
                      gap: 14,
                      flexWrap: "wrap",
                      marginBottom: 8,
                    }}
                  >
                    <span>combinado: {fmtMoney(emp.valorCombinado)}</span>
                    <span style={{ color: COLORS.sage }}>pago: {fmtMoney(pago)}</span>
                    {restante > 0 && <span style={{ color: COLORS.rust }}>falta: {fmtMoney(restante)}</span>}
                  </div>

                  {(emp.pagamentos || []).length > 0 && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 8 }}>
                      {emp.pagamentos.map((p) => (
                        <div
                          key={p.id}
                          style={{
                            display: "flex",
                            justifyContent: "space-between",
                            alignItems: "center",
                            fontSize: 12.5,
                            color: COLORS.inkSoft,
                            background: "#F5EFE0",
                            borderRadius: 5,
                            padding: "3px 8px",
                          }}
                        >
                          <span>{fmtDate(p.data)} · {fmtMoney(p.valor)}</span>
                          <BotaoExcluir small onConfirm={() => onRemoverPagamento(emp.id, p.id)} />
                        </div>
                      ))}
                    </div>
                  )}

                  {/* registrar pagamento: sempre disponível, mesmo depois de devolvido, pra poder corrigir o registro */}
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", marginBottom: 8 }}>
                    <Input
                      type="number"
                      step="0.01"
                      placeholder="valor pago"
                      value={pagamentoInputs[emp.id] || ""}
                      onChange={(e) => setPagamentoInputs((p) => ({ ...p, [emp.id]: e.target.value }))}
                      style={{ width: 110, padding: "7px 10px", fontSize: 13 }}
                    />
                    <Button
                      variant="subtle"
                      style={{ padding: "7px 12px", fontSize: 13 }}
                      onClick={() => {
                        onPagar(emp.id, pagamentoInputs[emp.id]);
                        setPagamentoInputs((p) => ({ ...p, [emp.id]: "" }));
                      }}
                    >
                      Registrar pagamento
                    </Button>
                    {!emp.devolvido && (
                      <Button
                        variant="subtle"
                        style={{ padding: "7px 12px", fontSize: 13 }}
                        onClick={() => onRenovarSemana(emp.id)}
                        title="Adia o prazo em 7 dias e soma o valor semanal do livro, se cadastrado"
                      >
                        📅 +1 semana
                      </Button>
                    )}
                    {!emp.devolvido && (
                      <BotaoDevolver
                        restante={restante}
                        descontoSugerido={descontoSugerido}
                        diasRestantes={diasRestantes}
                        onConfirmar={(desconto) => onDevolver(emp.id, desconto)}
                      />
                    )}
                  </div>

                  {pessoa && pessoa.telefone && restante > 0 && (
                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 8 }}>
                      <a
                        href={linkWhatsApp(pessoa.telefone, mensagemCobranca(emp, livro, pessoa))}
                        target="_blank"
                        rel="noreferrer"
                        onClick={() => onRegistrarCobranca(emp.id, "cobranca", restante)}
                      >
                        <Button variant="whats" style={{ padding: "7px 12px", fontSize: 13 }}>
                          💬 Cobrar via WhatsApp
                        </Button>
                      </a>
                      {!emp.devolvido && (
                        <a
                          href={linkWhatsApp(pessoa.telefone, mensagemRenovacao(emp, livro, pessoa))}
                          target="_blank"
                          rel="noreferrer"
                          onClick={() => onRegistrarCobranca(emp.id, "lembrete", 0)}
                        >
                          <Button variant="subtle" style={{ padding: "7px 12px", fontSize: 13 }}>
                            💬 Lembrar prazo
                          </Button>
                        </a>
                      )}
                      <a
                        href={linkSMS(pessoa.telefone, mensagemCobranca(emp, livro, pessoa))}
                        onClick={() => onRegistrarCobranca(emp.id, "sms", restante)}
                      >
                        <Button variant="subtle" style={{ padding: "7px 12px", fontSize: 13 }}>
                          ✉️ SMS
                        </Button>
                      </a>
                    </div>
                  )}
                  {!emp.devolvido && !(pessoa && pessoa.telefone) && (
                    <div style={{ fontSize: 12, color: COLORS.inkSoft, marginBottom: 8 }}>
                      Cadastre o celular {pessoa ? "de " + pessoa.nome : "dessa pessoa"} na aba Pessoas pra poder cobrar por WhatsApp.
                    </div>
                  )}
                  {emp.devolvido && (
                    <div style={{ fontSize: 12, color: COLORS.inkSoft, marginBottom: 8 }}>
                      devolvido em {fmtDate(emp.dataDevolucao)}
                    </div>
                  )}

                  <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 4 }}>
                    <BotaoExcluir label="excluir empréstimo" onConfirm={() => onRemover(emp.id)} />
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </Section>
    </div>
  );
}

// ---------------- Acervo ----------------
async function buscarCapaGoogleBooks(titulo, q_autor) {
  async function tentar(q) {
    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=5`);
    if (!res.ok) throw new Error("google-books-http-" + res.status);
    const data = await res.json();
    const itens = data?.items || [];
    for (const item of itens) {
      const links = item?.volumeInfo?.imageLinks;
      const link = links?.thumbnail || links?.smallThumbnail;
      if (link) return link.replace("http://", "https://");
    }
    return null;
  }
  // 1ª tentativa: título + autor juntos (busca livre, sem operadores rígidos)
  if (q_autor) {
    const achou = await tentar(`${titulo} ${q_autor}`);
    if (achou) return achou;
  }
  // 2ª tentativa: só o título
  return await tentar(titulo);
}

async function buscarCapaOpenLibrary(titulo, autor) {
  const q = autor ? `${titulo} ${autor}` : titulo;
  const res = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=5&fields=cover_i`);
  if (!res.ok) throw new Error("open-library-http-" + res.status);
  const data = await res.json();
  const itens = data?.docs || [];
  for (const item of itens) {
    if (item.cover_i) return `https://covers.openlibrary.org/b/id/${item.cover_i}-M.jpg`;
  }
  return null;
}

// tenta o Google Books primeiro e, se não achar nada (ou der erro — rede, CORS, etc.),
// tenta o Open Library como segunda fonte. Retorna { link, motivo } — motivo explica
// o que aconteceu quando link vem nulo, pra não ficar um botão que "não faz nada".
async function buscarCapaLivro(titulo, autor) {
  let erroGoogle = null;
  try {
    const link = await buscarCapaGoogleBooks(titulo, autor);
    if (link) return { link, motivo: null };
  } catch (e) {
    erroGoogle = e.message;
  }
  try {
    const link = await buscarCapaOpenLibrary(titulo, autor);
    if (link) return { link, motivo: null };
  } catch (e) {
    return {
      link: null,
      motivo: erroGoogle
        ? "Não consegui acessar os buscadores de capa agora (sem internet ou bloqueado pelo navegador)."
        : "Nenhuma capa encontrada pra esse título nos buscadores.",
    };
  }
  return { link: null, motivo: "Nenhuma capa encontrada pra esse título nos buscadores." };
}

                  <summary style={{ fontSize: 12, color: COLORS.burgundy, cursor: "pointer" }}>
                    fila de espera{filaDoLivro(l.id).length > 0 ? ` (${filaDoLivro(l.id).length})` : ""}
                  </summary>
                  <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 6 }}>
                    {filaDoLivro(l.id).map((f, i) => {
                      const p = pessoaById(f.pessoaId);
                      return (
                        <div key={f.id} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5 }}>
                          <span style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.inkSoft, width: 20 }}>
                            {i + 1}º
                          </span>
                          <span style={{ flex: 1 }}>{p ? nomeCompleto(p) : "(pessoa removida)"}</span>
                          <button
                            onClick={() => onMoverFila(f.id, -1)}
                            disabled={i === 0}
                            style={{ background: "none", border: `1px solid ${COLORS.rule}`, borderRadius: 4, padding: "2px 6px", cursor: i === 0 ? "default" : "pointer", opacity: i === 0 ? 0.35 : 1 }}
                          >
                            ↑
                          </button>
                          <button
                            onClick={() => onMoverFila(f.id, 1)}
                            disabled={i === filaDoLivro(l.id).length - 1}
                            style={{ background: "none", border: `1px solid ${COLORS.rule}`, borderRadius: 4, padding: "2px 6px", cursor: i === filaDoLivro(l.id).length - 1 ? "default" : "pointer", opacity: i === filaDoLivro(l.id).length - 1 ? 0.35 : 1 }}
                          >
                            ↓
                          </button>
                          <BotaoExcluir label="remover" small onConfirm={() => onRemoverFila(f.id)} />
                        </div>
                      );
                    })}
                    {filaDoLivro(l.id).length === 0 && (
                      <div style={{ fontSize: 12, color: COLORS.inkSoft }}>Ninguém esperando esse livro ainda.</div>
                    )}
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 4 }}>
                      <select
                        value={filaSelecionado[l.id] || ""}
                        onChange={(e) => setFilaSelecionado((prev) => ({ ...prev, [l.id]: e.target.value }))}
                        style={{ ...inputBase, flex: "1 1 160px", padding: "6px 8px", fontSize: 12.5 }}
                      >
                        <option value="">+ pessoa já cadastrada…</option>
                        {pessoas.map((p) => (
                          <option key={p.id} value={p.id}>{nomeCompleto(p)}</option>
                        ))}
                      </select>
                      <Button
                        variant="subtle"
                        style={{ padding: "6px 10px", fontSize: 12.5 }}
                        onClick={() => {
                          if (!filaSelecionado[l.id]) return;
                          onAdicionarFila(l.id, filaSelecionado[l.id]);
                          setFilaSelecionado((prev) => ({ ...prev, [l.id]: "" }));
                        }}
                      >
                        Adicionar
                      </Button>
                    </div>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                      <Input
                        placeholder="ou nome de alguém novo"
                        value={filaNomeNovo[l.id] || ""}
                        onChange={(e) => setFilaNomeNovo((prev) => ({ ...prev, [l.id]: e.target.value }))}
                        style={{ flex: "1 1 160px", padding: "6px 8px", fontSize: 12.5 }}
                      />
                      <Button
                        variant="subtle"
                        style={{ padding: "6px 10px", fontSize: 12.5 }}
                        onClick={() => {
                          const nome = (filaNomeNovo[l.id] || "").trim();
                          if (!nome) return;
                          const { nome: primeiro, sobrenome } = separarNome(nome);
                          onAdicionarFila(l.id, null, { nome: primeiro, sobrenome });
                          setFilaNomeNovo((prev) => ({ ...prev, [l.id]: "" }));
                        }}
                      >
                        Adicionar
                      </Button>
                    </div>
                  </div>
                </details>
              )}
            </div>
          );
        })}
      </div>
    </Section>
  );
}

// ---------------- Categorias e Tags ----------------
function CategoriasTab({ categorias, tags, onAddCategoria, onRemoverCategoria, onAddTag, onRemoverTag }) {

  const [novaTag, setNovaTag] = useState("");

  return (
    <div>
      <Section eyebrow="Organização" title="Categorias">
        <div style={{ fontSize: 12.5, color: COLORS.inkSoft, marginBottom: 12 }}>
          Cada livro tem <b>uma</b> categoria (ex: teologia, biografia, ficção). Cadastre aqui pra elas aparecerem
          como opções prontas no Acervo.
        </div>
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          <Input
            placeholder="Nova categoria"

              if (e.key === "Enter") {

            onClick={() => {

            <div

                border: `1.5px solid ${COLORS.rule}`,

                alignItems: "center",

          "apologética", "leitura fácil").

        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
