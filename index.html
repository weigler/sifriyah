// ---------------- Pessoas ----------------
function PessoasTab({
  pessoas,
  emprestimos,
  livroById,
  totalPago,
  onUpsert,
  onRemove,
  preCadastros = [],
  onImportarPreCadastro,
  onDescartarPreCadastro,
}) {
  const [novoNome, setNovoNome] = useState("");
  const [novoSobrenome, setNovoSobrenome] = useState("");
  const [novoTel, setNovoTel] = useState("");
  const [novoEmail, setNovoEmail] = useState("");
  const [novoGenero, setNovoGenero] = useState("");
  const [editandoId, setEditandoId] = useState(null);
  const [editNome, setEditNome] = useState("");
  const [editSobrenome, setEditSobrenome] = useState("");
  const [editTel, setEditTel] = useState("");
  const [editEmail, setEditEmail] = useState("");
  const [editGenero, setEditGenero] = useState("");
  const [historicoAberto, setHistoricoAberto] = useState({});

  const resumo = pessoas.map((p) => {
    const dela = emprestimos.filter((e) => e.pessoaId === p.id);
    const combinado = dela.reduce((s, e) => s + (e.valorCombinado || 0), 0);
    const pago = dela.reduce((s, e) => s + totalPago(e), 0);
    const ativos = dela.filter((e) => !e.devolvido);
    const historico = dela.filter((e) => e.devolvido).sort((a, b) => (a.dataDevolucao < b.dataDevolucao ? 1 : -1));
    return { pessoa: p, combinado, pago, saldo: combinado - pago, ativos, historico };
  });

  function abrirEdicao(p) {
    setEditandoId(p.id);
    setEditNome(p.nome);
    setEditSobrenome(p.sobrenome || "");
    setEditTel(p.telefone || "");
    setEditEmail(p.email || "");
    setEditGenero(p.genero || "");
  }

  function salvarEdicao() {
    onUpsert({ nome: editNome, sobrenome: editSobrenome, telefone: editTel, email: editEmail, genero: editGenero }, editandoId);
    setEditandoId(null);
  }

  return (
    <Section eyebrow="Contas e contatos" title="Pessoas">
      {preCadastros.length > 0 && (
        <div
          style={{
            background: "#FBF3DC",
            border: `1.5px solid ${COLORS.gold}`,
            borderRadius: 10,
            padding: 16,
            marginBottom: 20,
            display: "flex",
            flexDirection: "column",
            gap: 10,
          }}
        >
          <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 16 }}>
            📥 Pré-cadastros recebidos ({preCadastros.length})
          </div>
          <div style={{ fontSize: 12.5, color: COLORS.inkSoft }}>
            Pessoas que se cadastraram sozinhas pela vitrine pública. Revise antes de adicionar.
          </div>
          {preCadastros.map((pc) => (
            <div
              key={pc.id}
              style={{
                background: "#fff",
                border: `1px solid ${COLORS.rule}`,
                borderRadius: 8,
                padding: "10px 12px",
                display: "flex",
                alignItems: "center",
                gap: 10,
                flexWrap: "wrap",
              }}
            >
              <div style={{ flex: 1, minWidth: 160 }}>
                <b>{pc.nome} {pc.sobrenome}</b>
                <div style={{ fontSize: 12.5, color: COLORS.inkSoft }}>
                  {pc.telefone || "sem celular"}{pc.email ? " · " + pc.email : ""}
                </div>
              </div>
              <Button style={{ padding: "6px 12px", fontSize: 12.5 }} onClick={() => onImportarPreCadastro(pc)}>
                Adicionar como pessoa
              </Button>
              <Button variant="ghost" style={{ padding: "6px 12px", fontSize: 12.5 }} onClick={() => onDescartarPreCadastro(pc)}>
                Descartar
              </Button>
            </div>
          ))}
        </div>
      )}

      <div
        style={{
          background: COLORS.card,
          border: `1.5px solid ${COLORS.rule}`,
          borderRadius: 10,
          padding: 16,
          marginBottom: 20,
          display: "flex",
          flexDirection: "column",
          gap: 8,
        }}
      >
        <label style={labelStyle}>Cadastrar pessoa</label>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <Input placeholder="Nome" value={novoNome} onChange={(e) => setNovoNome(e.target.value)} style={{ flex: "1 1 120px" }} />
          <Input placeholder="Sobrenome" value={novoSobrenome} onChange={(e) => setNovoSobrenome(e.target.value)} style={{ flex: "1 1 120px" }} />
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <Input placeholder="Celular com DDD" value={novoTel} onChange={(e) => setNovoTel(e.target.value)} style={{ flex: "1 1 140px" }} />
          <Input placeholder="E-mail (opcional)" value={novoEmail} onChange={(e) => setNovoEmail(e.target.value)} style={{ flex: "1 1 140px" }} />
          <select value={novoGenero} onChange={(e) => setNovoGenero(e.target.value)} style={{ ...inputBase, flex: "1 1 140px" }}>
            <option value="">Gênero (opcional)</option>
            <option value="M">Masculino</option>
            <option value="F">Feminino</option>
          </select>
        </div>
        <Button
          style={{ alignSelf: "flex-start" }}
          onClick={() => {
            if (!novoNome.trim()) return;
            onUpsert({ nome: novoNome.trim(), sobrenome: novoSobrenome.trim(), telefone: novoTel, email: novoEmail, genero: novoGenero });
            setNovoNome("");
            setNovoSobrenome("");
            setNovoTel("");
            setNovoEmail("");
            setNovoGenero("");
          }}
        >
          Salvar pessoa
        </Button>
      </div>

      {resumo.length === 0 && <EmptyState text="Ninguém cadastrado ainda." />}
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {resumo.map(({ pessoa: p, combinado, pago, saldo, ativos, historico }) => (
          <div key={p.id} style={{ background: COLORS.card, border: `1.5px solid ${COLORS.rule}`, borderRadius: 10, padding: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
              <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 17 }}>{nomeCompleto(p)}</div>
              {saldo !== 0 && (
                <div
                  style={{
                    fontFamily: "'JetBrains Mono', monospace",
                    fontSize: 13,
                    color: saldo > 0 ? COLORS.rust : COLORS.sage,
                    fontWeight: 600,
                  }}
                >
                  {saldo > 0 ? `deve ${fmtMoney(saldo)}` : "em dia"}
                </div>
              )}
            </div>
            <div style={{ fontSize: 12, color: COLORS.inkSoft, marginTop: 2 }}>
              {ativos.length} livro(s) com {pronomeGenero(p, "ele", "ela", "essa pessoa")} agora
            </div>
            {ativos.length > 0 && (
              <ul style={{ margin: "8px 0 0", paddingLeft: 18, fontSize: 13.5 }}>
                {ativos.map((e) => {
                  const l = livroById(e.livroId);
                  return <li key={e.id}>{l ? l.titulo : "(livro removido)"}</li>;
                })}
              </ul>
            )}
            {historico.length > 0 && (
              <div style={{ marginTop: 8 }}>
                <button
                  onClick={() => setHistoricoAberto((prev) => ({ ...prev, [p.id]: !prev[p.id] }))}
                  style={{ background: "none", border: "none", color: COLORS.burgundy, cursor: "pointer", fontSize: 12.5, textDecoration: "underline", padding: 0 }}
                >
                  {historicoAberto[p.id] ? "ocultar" : "ver"} histórico de leitura ({historico.length} livro{historico.length > 1 ? "s" : ""})
                </button>
                {historicoAberto[p.id] && (
                  <ul style={{ margin: "8px 0 0", paddingLeft: 18, fontSize: 13, color: COLORS.inkSoft }}>
                    {historico.map((e) => {
                      const l = livroById(e.livroId);
                      return (
                        <li key={e.id}>
                          {l ? l.titulo : "(livro removido)"} <span style={{ fontSize: 11.5 }}>· devolvido em {fmtDate(e.dataDevolucao)}</span>
                        </li>
                      );
                    })}
                  </ul>
                )}
              </div>
            )}

            {editandoId === p.id ? (
              <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 8 }}>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <Input placeholder="Nome" value={editNome} onChange={(e) => setEditNome(e.target.value)} style={{ flex: "1 1 120px", padding: "7px 10px", fontSize: 13 }} />
                  <Input placeholder="Sobrenome" value={editSobrenome} onChange={(e) => setEditSobrenome(e.target.value)} style={{ flex: "1 1 120px", padding: "7px 10px", fontSize: 13 }} />
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <Input placeholder="Celular" value={editTel} onChange={(e) => setEditTel(e.target.value)} style={{ flex: "1 1 130px", padding: "7px 10px", fontSize: 13 }} />
                  <Input placeholder="E-mail" value={editEmail} onChange={(e) => setEditEmail(e.target.value)} style={{ flex: "1 1 130px", padding: "7px 10px", fontSize: 13 }} />
                  <select value={editGenero} onChange={(e) => setEditGenero(e.target.value)} style={{ ...inputBase, flex: "1 1 130px", padding: "7px 10px", fontSize: 13 }}>
                    <option value="">Gênero (opcional)</option>
                    <option value="M">Masculino</option>
                    <option value="F">Feminino</option>
                  </select>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <Button style={{ padding: "7px 12px", fontSize: 13 }} onClick={salvarEdicao}>
                    Salvar
                  </Button>
                  <Button variant="ghost" style={{ padding: "7px 12px", fontSize: 13 }} onClick={() => setEditandoId(null)}>
                    Cancelar
                  </Button>
                  <button
                    onClick={() => onRemove(p.id)}
                    style={{ marginLeft: "auto", background: "none", border: "none", color: COLORS.rust, fontSize: 12.5, cursor: "pointer", textDecoration: "underline" }}
                  >
                    remover pessoa
                  </button>
                </div>
              </div>
            ) : (
              <div style={{ marginTop: 10, display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
                <span style={{ fontSize: 13, color: COLORS.inkSoft, fontFamily: "'JetBrains Mono', monospace" }}>
                  {p.telefone ? p.telefone : "sem celular"}
                  {p.email ? ` · ${p.email}` : ""}
                </span>
                <button
                  onClick={() => abrirEdicao(p)}
                  style={{ background: "none", border: "none", color: COLORS.burgundy, cursor: "pointer", fontSize: 13, textDecoration: "underline" }}
                >
                  editar contato
                </button>
              </div>
            )}
          </div>
        ))}
      </div>
    </Section>
  );
}

// ---------------- Financeiro ----------------
function FinanceiroTab({ emprestimos, cobrancas, pessoaById, livroById, totalPago, onRemoverCobranca }) {
  const totalCombinado = emprestimos.reduce((s, e) => s + (e.valorCombinado || 0), 0);
  const totalRecebido = emprestimos.reduce((s, e) => s + totalPago(e), 0);
  const totalPendente = Math.max(0, totalCombinado - totalRecebido);

  const pagamentos = emprestimos
    .flatMap((e) => (e.pagamentos || []).map((p) => ({ ...p, emprestimo: e })))
    .sort((a, b) => (a.data < b.data ? 1 : -1));

  const cobrancasOrdenadas = [...cobrancas].sort((a, b) => (a.data < b.data ? 1 : -1));

  const rotuloTipo = { cobranca: "cobrança enviada", lembrete: "lembrete de prazo", sms: "cobrança por SMS" };

  const contagemPorLivro = {};
  emprestimos.forEach((e) => {
    contagemPorLivro[e.livroId] = (contagemPorLivro[e.livroId] || 0) + 1;
  });
  const ranking = Object.entries(contagemPorLivro)
    .map(([livroId, qtd]) => ({ livro: livroById(livroId), qtd }))
    .filter((r) => r.livro)
    .sort((a, b) => b.qtd - a.qtd)
    .slice(0, 5);

  function exportarPDF() {
    const janela = window.open("", "_blank");
    if (!janela) {
      alert("O navegador bloqueou a janela de impressão. Permita pop-ups pra esse site e tente de novo.");
      return;
    }
    const linhasPagamentos = pagamentos
      .map((p) => {
        const pessoa = pessoaById(p.emprestimo.pessoaId);
        const livro = livroById(p.emprestimo.livroId);
        return `<tr><td>${fmtDate(p.data)}</td><td>${pessoa ? nomeCompleto(pessoa) : "—"}</td><td>${
          livro ? livro.titulo : "—"
        }</td><td style="text-align:right">${fmtMoney(p.valor)}</td></tr>`;
      })
      .join("");
    const linhasRanking = ranking
      .map((r) => `<tr><td>${r.livro.titulo}</td><td style="text-align:right">${r.qtd}x</td></tr>`)
      .join("");

    janela.document.write(`
      <html><head><meta charset="utf-8"><title>Relatório financeiro · Sifriyah</title>
      <style>
        body { font-family: Georgia, serif; color: #2B2118; padding: 32px; }
        h1 { font-size: 22px; margin-bottom: 2px; }
        .sub { color: #5B4E3F; font-size: 12px; margin-bottom: 24px; }
        h2 { font-size: 15px; border-bottom: 1px solid #D8CBB0; padding-bottom: 4px; margin-top: 28px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
        td, th { padding: 6px 8px; border-bottom: 1px solid #eee; text-align: left; }
        .totais { display: flex; gap: 24px; margin-top: 8px; }
        .totais div { font-size: 13px; }
        .totais b { display: block; font-size: 17px; }
      </style></head><body>
      <h1>Sifriyah · Relatório financeiro</h1>
      <div class="sub">Gerado em ${fmtDate(todayISO())}</div>
      <div class="totais">
        <div>Combinado (todos)<b>${fmtMoney(totalCombinado)}</b></div>
        <div>Recebido<b>${fmtMoney(totalRecebido)}</b></div>
        <div>Pendente<b>${fmtMoney(totalPendente)}</b></div>
      </div>
      <h2>Livros mais emprestados</h2>
      <table>${linhasRanking || "<tr><td>Sem dados ainda.</td></tr>"}</table>
      <h2>Pagamentos recebidos</h2>
      <table><tr><th>Data</th><th>Pessoa</th><th>Livro</th><th style="text-align:right">Valor</th></tr>${
        linhasPagamentos || "<tr><td colspan=4>Sem pagamentos ainda.</td></tr>"
      }</table>
      </body></html>
    `);
    janela.document.close();
    setTimeout(() => janela.print(), 300);
  }

  return (
    <div>
      <Section eyebrow="Caixa" title="Financeiro">
        <Button variant="subtle" style={{ marginBottom: 16 }} onClick={exportarPDF}>
          🖨️ Exportar relatório (PDF)
        </Button>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 24 }}>
          {[
            { label: "combinado (todos)", valor: totalCombinado, cor: COLORS.ink },
            { label: "recebido", valor: totalRecebido, cor: COLORS.sage },
            { label: "pendente", valor: totalPendente, cor: COLORS.rust },
          ].map((c) => (
            <div
              key={c.label}
              style={{
                flex: "1 1 140px",
                background: COLORS.card,
                border: `1.5px solid ${COLORS.rule}`,
                borderRadius: 10,
                padding: "14px 16px",
              }}
            >
              <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5, color: COLORS.inkSoft, fontFamily: "'JetBrains Mono', monospace" }}>
                {c.label}
              </div>
              <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 20, color: c.cor }}>
                {fmtMoney(c.valor)}
              </div>
            </div>
          ))}
        </div>
      </Section>

      {ranking.length > 0 && (
        <Section eyebrow="Ranking" title="Livros mais emprestados">
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {ranking.map((r, i) => (
              <div
                key={r.livro.id}
                style={{
                  background: COLORS.card,
                  border: `1px solid ${COLORS.rule}`,
                  borderRadius: 8,
                  padding: "9px 14px",
                  display: "flex",
                  justifyContent: "space-between",
                  fontSize: 13.5,
                }}
              >
                <span>{i + 1}. {r.livro.titulo}</span>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.gold, fontWeight: 600 }}>
                  {r.qtd}x
                </span>
              </div>
            ))}
          </div>
        </Section>
      )}

      <Section eyebrow="Histórico" title="Pagamentos recebidos">
        {pagamentos.length === 0 && <EmptyState text="Nenhum pagamento registrado ainda." />}
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {pagamentos.map((p, i) => {
            const pessoa = pessoaById(p.emprestimo.pessoaId);
            const livro = livroById(p.emprestimo.livroId);
            return (
              <div
                key={i}
                style={{
                  background: COLORS.card,
                  border: `1px solid ${COLORS.rule}`,
                  borderRadius: 8,
                  padding: "10px 14px",
                  display: "flex",
                  justifyContent: "space-between",
                  fontSize: 13.5,
                  gap: 10,
                }}
              >
                <div>
                  <b>{pessoa ? nomeCompleto(pessoa) : "(pessoa removida)"}</b> · {livro ? livro.titulo : "(livro removido)"}
                  <div style={{ fontSize: 11.5, color: COLORS.inkSoft }}>{fmtDate(p.data)}</div>
                </div>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.sage, fontWeight: 600 }}>
                  +{fmtMoney(p.valor)}
                </div>
              </div>
            );
          })}
        </div>
      </Section>

      <Section eyebrow="Histórico" title="Cobranças enviadas">
        {cobrancasOrdenadas.length === 0 && <EmptyState text="Nenhuma cobrança enviada ainda." />}
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {cobrancasOrdenadas.map((c) => {
            const emp = emprestimos.find((e) => e.id === c.emprestimoId);
            const pessoa = emp ? pessoaById(emp.pessoaId) : null;
            const livro = emp ? livroById(emp.livroId) : null;
            return (
              <div
                key={c.id}
                style={{
                  background: COLORS.card,
                  border: `1px solid ${COLORS.rule}`,
                  borderRadius: 8,
                  padding: "10px 14px",
                  display: "flex",
                  justifyContent: "space-between",
                  fontSize: 13.5,
                  gap: 10,
                }}
              >
                <div>
                  <b>{pessoa ? nomeCompleto(pessoa) : "(pessoa removida)"}</b> · {livro ? livro.titulo : "(livro removido)"}
                  <div style={{ fontSize: 11.5, color: COLORS.inkSoft }}>
                    {rotuloTipo[c.tipo] || c.tipo} · {fmtDate(c.data)}
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  {c.valor > 0 && (
                    <div style={{ fontFamily: "'JetBrains Mono', monospace", color: COLORS.gold, fontWeight: 600 }}>
                      {fmtMoney(c.valor)}
                    </div>
                  )}
                  <BotaoExcluir small onConfirm={() => onRemoverCobranca(c.id)} />
                </div>
              </div>
            );
          })}
        </div>
      </Section>
    </div>
  );
}

// ---------------- Ajustes ----------------
function AjustesTab({
  config,
  onChange,
  cloudConfig,
  cloudStatus,
  onConfigurarNuvem,
  onDesligarNuvem,
  ultimoSalvamento,
  ultimoBackup,
  backups,
  carregandoBackups,
  fazendoBackup,
  onFazerBackup,
  onAtualizarBackups,
  onRestaurarBackup,
  onApagarBackup,
  semSenha,
  onTrocarSenha,
  onDesativarSenha,
  onAtivarSenha,
  adminEmail,
  statusAdminAuth,
  onEntrarAdmin,
  onSairAdmin,
}) {
  const [pix, setPix] = useState(config.pix || "");
  const [recebedor, setRecebedor] = useState(config.recebedor || "");
  const [whatsappContato, setWhatsappContato] = useState(config.whatsappContato || "");
  const [linkVitrine, setLinkVitrine] = useState(config.linkVitrine || "");
  const [promoAtiva, setPromoAtiva] = useState(config.promocao?.ativa || false);
  const [promoDescricao, setPromoDescricao] = useState(config.promocao?.descricao || "");
  const [promoValidoAte, setPromoValidoAte] = useState(config.promocao?.validoAte || "");
  const [promoDesconto, setPromoDesconto] = useState(config.promocao?.desconto || "");
  const MODELO_COBRANCA_PADRAO =
    'Oi {nome}! 👋 Passando pra lembrar sobre o livro "{livro}" que te emprestei — falta {valor} do combinado. {pix} Qualquer coisa me chama! 🙏';
  const MODELO_RENOVACAO_PADRAO =
    'Oi {nome}! 👋 Só passando pra saber sobre o livro "{livro}" — o prazo era {prazo}. Você já terminou ou quer renovar por mais um tempo? Me avisa 🙂';
  const [modeloCobranca, setModeloCobranca] = useState(config.modeloCobranca || MODELO_COBRANCA_PADRAO);
  const [modeloRenovacao, setModeloRenovacao] = useState(config.modeloRenovacao || MODELO_RENOVACAO_PADRAO);
  const [colado, setColado] = useState("");
  const [docId, setDocId] = useState(cloudConfig?.docId || "principal");
  const [erroNuvem, setErroNuvem] = useState("");
  const [emailAdminForm, setEmailAdminForm] = useState("");
  const [senhaAdminForm, setSenhaAdminForm] = useState("");
  const [erroAdmin, setErroAdmin] = useState("");
  const [entrandoAdmin, setEntrandoAdmin] = useState(false);
  const [restaurandoId, setRestaurandoId] = useState(null);
  const [restauradoOk, setRestauradoOk] = useState(false);

  const [senhaAtualDigitada, setSenhaAtualDigitada] = useState("");
  const [novaSenha, setNovaSenha] = useState("");
  const [confirmarNovaSenha, setConfirmarNovaSenha] = useState("");
  const [erroSenha, setErroSenha] = useState("");
  const [okSenha, setOkSenha] = useState("");
  const [trocandoSenha, setTrocandoSenha] = useState(false);
  const [confirmandoDesativar, setConfirmandoDesativar] = useState(false);
  const [ativandoSenha, setAtivandoSenha] = useState(false);
  const [novaSenhaAtivar, setNovaSenhaAtivar] = useState("");
  const [confirmarSenhaAtivar, setConfirmarSenhaAtivar] = useState("");

  useEffect(() => {
    onAtualizarBackups();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  async function handleRestaurar(backup) {
    setRestaurandoId(backup.id);
    setRestauradoOk(false);
    try {
      await onRestaurarBackup(backup);
      setRestauradoOk(true);
    } catch (e) {
      console.error("Erro ao restaurar backup:", e);
    }
    setRestaurandoId(null);
  }

  async function handleTrocarSenha() {
    setErroSenha("");
    setOkSenha("");
    if (novaSenha !== confirmarNovaSenha) {
      setErroSenha("As senhas não coincidem.");
      return;
    }
    setTrocandoSenha(true);
    const r = await onTrocarSenha(senhaAtualDigitada, novaSenha);
    setTrocandoSenha(false);
    if (r.ok) {
      setOkSenha("Senha alterada com sucesso.");
      setSenhaAtualDigitada("");
      setNovaSenha("");
      setConfirmarNovaSenha("");
    } else {
      setErroSenha(r.erro);
    }
  }

  async function handleDesativarSenha() {
    setTrocandoSenha(true);
    await onDesativarSenha();
    setTrocandoSenha(false);
    setConfirmandoDesativar(false);
  }

  async function handleAtivarSenha() {
    setErroSenha("");
    if (novaSenhaAtivar !== confirmarSenhaAtivar) {
      setErroSenha("As senhas não coincidem.");
      return;
    }
    setTrocandoSenha(true);
    const r = await onAtivarSenha(novaSenhaAtivar);
    setTrocandoSenha(false);
    if (r.ok) {
      setAtivandoSenha(false);
      setNovaSenhaAtivar("");
      setConfirmarSenhaAtivar("");
    } else {
      setErroSenha(r.erro);
    }
  }

  function salvarGeral() {
    onChange({
      pix,
      recebedor,
      whatsappContato,
      linkVitrine,
      promocao: {
        ativa: promoAtiva,
        descricao: promoDescricao,
        validoAte: promoValidoAte,
        desconto: promoDesconto ? parseFloat(promoDesconto) : 0,
      },
      modeloCobranca,
      modeloRenovacao,
    });
  }

  function ativarNuvem() {
    setErroNuvem("");
    try {
      const obj = parseFirebaseConfigColado(colado);
      onConfigurarNuvem(obj, docId || "principal");
    } catch (e) {
      setErroNuvem("Não consegui ler essa configuração. Confere se colou o bloco inteiro do Firebase.");
    }
  }

  async function handleEntrarAdmin() {
    setErroAdmin("");
    setEntrandoAdmin(true);
    const r = await onEntrarAdmin(emailAdminForm, senhaAdminForm);
    setEntrandoAdmin(false);
    if (r.ok) {
      setSenhaAdminForm("");
    } else {
      setErroAdmin(r.erro);
    }
  }

  const statusLabel = {
    desligada: { texto: "desligada — salvando só neste aparelho", cor: COLORS.inkSoft },
    conectando: { texto: "conectando…", cor: COLORS.gold },
    sincronizada: { texto: "sincronizada com a nuvem ✓", cor: COLORS.sage },
    erro: { texto: "erro ao conectar — confere a configuração", cor: COLORS.rust },
    "sem-login": { texto: "sem permissão — entre com o login de administrador abaixo", cor: COLORS.rust },
  }[cloudStatus];

  return (
    <Section eyebrow="Cobrança" title="Ajustes">
      <div
        style={{
          background: COLORS.card,
          border: `1.5px solid ${COLORS.rule}`,
          borderRadius: 10,
          padding: 16,
          display: "flex",
          flexDirection: "column",
          gap: 10,
        }}
      >
        <label style={labelStyle}>Chave Pix (aparece nas mensagens de cobrança)</label>
        <Input value={pix} onChange={(e) => setPix(e.target.value)} placeholder="ex: seuemail@email.com ou telefone" />
        <label style={labelStyle}>Nome do recebedor (opcional)</label>
        <Input value={recebedor} onChange={(e) => setRecebedor(e.target.value)} placeholder="ex: Weigler" />
        <label style={labelStyle}>Seu WhatsApp (usado na vitrine pública, pra reservas)</label>
        <Input value={whatsappContato} onChange={(e) => setWhatsappContato(e.target.value)} placeholder="(11) 91234-5678" />
        <Button style={{ alignSelf: "flex-start" }} onClick={salvarGeral}>
          Salvar
        </Button>
      </div>

      <div
        style={{
          background: COLORS.card,
          border: `1.5px solid ${COLORS.rule}`,
          borderRadius: 10,
          padding: 16,
          marginTop: 16,
          display: "flex",
          flexDirection: "column",
          gap: 10,
        }}
      >
        <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 16 }}>
          Textos das mensagens
        </div>
        <div style={{ fontSize: 12, color: COLORS.inkSoft }}>
          Use <code>{"{nome}"}</code>, <code>{"{livro}"}</code>, <code>{"{valor}"}</code>, <code>{"{prazo}"}</code> e{" "}
          <code>{"{pix}"}</code> — eles são trocados automaticamente na hora de enviar.
        </div>
        <label style={labelStyle}>Mensagem de cobrança</label>
        <textarea
          value={modeloCobranca}
          onChange={(e) => setModeloCobranca(e.target.value)}
          rows={3}
          style={{ ...inputBase, fontFamily: "'Source Serif 4', serif" }}
        />
        <label style={labelStyle}>Mensagem de lembrete de prazo</label>
        <textarea
          value={modeloRenovacao}
          onChange={(e) => setModeloRenovacao(e.target.value)}
          rows={3}
          style={{ ...inputBase, fontFamily: "'Source Serif 4', serif" }}
        />
        <div style={{ display: "flex", gap: 8 }}>
          <Button style={{ alignSelf: "flex-start" }} onClick={salvarGeral}>
            Salvar textos
          </Button>
          <Button
            variant="ghost"
            style={{ alignSelf: "flex-start" }}
            onClick={() => {
              setModeloCobranca(MODELO_COBRANCA_PADRAO);
              setModeloRenovacao(MODELO_RENOVACAO_PADRAO);
            }}
          >
            Restaurar padrão
          </Button>
        </div>
      </div>

      <div
        style={{
          background: COLORS.card,
          border: `1.5px solid ${COLORS.rule}`,
          borderRadius: 10,
          padding: 16,
          marginTop: 16,
          display: "flex",
          flexDirection: "column",
          gap: 10,
        }}
      >
        <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 16 }}>
          Promoção
        </div>
        <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13.5 }}>
          <input type="checkbox" checked={promoAtiva} onChange={(e) => setPromoAtiva(e.target.checked)} />
          Promoção ativa (aparece pra você ao criar um empréstimo, e na vitrine pública)
        </label>
        <Input
          placeholder="ex: 50% de desconto em livros de teologia esse mês"
          value={promoDescricao}
          onChange={(e) => setPromoDescricao(e.target.value)}
        />
        <label style={labelStyle}>Desconto (%) — aplicado automaticamente no valor sugerido do empréstimo</label>
        <Input
          type="number"
          step="1"
          min="0"
          max="100"
          placeholder="ex: 50"
          value={promoDesconto}
          onChange={(e) => setPromoDesconto(e.target.value)}
        />
        <label style={labelStyle}>Válida até (opcional)</label>
        <Input type="date" value={promoValidoAte} onChange={(e) => setPromoValidoAte(e.target.value)} />
        <Button style={{ alignSelf: "flex-start" }} onClick={salvarGeral}>
          Salvar promoção
        </Button>
      </div>

      {cloudConfig && (
        <div
          style={{
            background: COLORS.card,
            border: `1.5px solid ${COLORS.rule}`,
            borderRadius: 10,
            padding: 16,
            marginTop: 16,
            display: "flex",
            flexDirection: "column",
            gap: 8,
          }}
        >
          <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 16 }}>
            Vitrine pública
          </div>
          <div style={{ fontSize: 12.5, color: COLORS.inkSoft }}>
            Página separada, sem senha, onde qualquer pessoa vê os livros disponíveis e pede reserva pelo seu WhatsApp.
            Ela atualiza sozinha sempre que você mexe no acervo.
          </div>
          <div style={{ fontSize: 12.5, color: COLORS.inkSoft }}>
            Código da biblioteca pra colar no arquivo <code>catalogo.html</code>: <b>{cloudConfig.docId}</b>
          </div>

          <label style={labelStyle}>Link da vitrine (cole aqui pra gerar o QR code)</label>
          <Input
            value={linkVitrine}
            onChange={(e) => setLinkVitrine(e.target.value)}
            placeholder="https://weigler.github.io/sifriyah/catalogo.html"
          />
          <Button style={{ alignSelf: "flex-start" }} onClick={salvarGeral}>
            Salvar link
          </Button>
          {linkVitrine && (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 6, marginTop: 6 }}>
              <img
                src={`https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(linkVitrine)}`}
                alt="QR code da vitrine pública"
                style={{ borderRadius: 8, border: `1.5px solid ${COLORS.rule}` }}
                width={180}
                height={180}
              />
              <a
                href={`https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=${encodeURIComponent(linkVitrine)}`}
                target="_blank"
                rel="noreferrer"
                style={{ fontSize: 12.5, color: COLORS.burgundy }}
              >
                abrir em alta resolução pra imprimir
              </a>
            </div>
          )}
        </div>
      )}

      <div
        style={{
          background: COLORS.card,
          border: `1.5px solid ${COLORS.rule}`,
          borderRadius: 10,
          padding: 16,
          marginTop: 16,
          display: "flex",
          flexDirection: "column",
          gap: 10,
        }}
      >
        <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 16 }}>
          Sincronização entre aparelhos
        </div>
        <div style={{ fontSize: 12.5, fontFamily: "'JetBrains Mono', monospace", color: statusLabel.cor }}>
          {statusLabel.texto}
        </div>

        {!cloudConfig ? (
          <>
            <label style={labelStyle}>Cole aqui a configuração do Firebase (firebaseConfig)</label>
            <textarea
              value={colado}
              onChange={(e) => setColado(e.target.value)}
              placeholder={`const firebaseConfig = {\n  apiKey: "...",\n  projectId: "...",\n  ...\n};`}
              rows={6}
              style={{ ...inputBase, fontFamily: "'JetBrains Mono', monospace", fontSize: 12.5 }}
            />
            <label style={labelStyle}>Código da biblioteca (opcional, deixa "principal" se não souber)</label>
            <Input value={docId} onChange={(e) => setDocId(e.target.value)} placeholder="principal" />
            {erroNuvem && <div style={{ color: COLORS.rust, fontSize: 12.5 }}>{erroNuvem}</div>}
            <Button style={{ alignSelf: "flex-start" }} onClick={ativarNuvem}>
              Ativar sincronização
            </Button>
            <div style={{ fontSize: 12, color: COLORS.inkSoft }}>
              Repete esse mesmo passo (colando a mesma configuração e o mesmo código) nos outros aparelhos pra eles
              se conectarem à mesma biblioteca.
            </div>
          </>
        ) : (
          <>
            <div style={{ fontSize: 12.5, color: COLORS.inkSoft }}>
              Projeto: <b>{cloudConfig.projectId}</b> · código: <b>{cloudConfig.docId}</b>
            </div>
            <Button variant="ghost" style={{ alignSelf: "flex-start" }} onClick={onDesligarNuvem}>
              Desligar sincronização
            </Button>
          </>
        )}
      </div>

      {cloudConfig && (
        <div
          style={{
            background: COLORS.card,
            border: `1.5px solid ${COLORS.rule}`,
            borderRadius: 10,
            padding: 16,
            marginTop: 16,
            display: "flex",
            flexDirection: "column",
            gap: 10,
          }}
        >
          <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 16 }}>
            Login de administrador
          </div>
          <div style={{ fontSize: 12, color: COLORS.inkSoft }}>
            Protege o Firestore de verdade — é diferente da senha do app (que só criptografa os dados). Precisa
            estar logado aqui pra sincronizar, ver e revisar pré-cadastros. Configure em Firebase Console →
            Authentication (veja as instruções que te passei).
          </div>
          {statusAdminAuth === "logado" ? (
            <>
              <div style={{ fontSize: 13, color: COLORS.sage }}>✓ Logado como {adminEmail}</div>
              <Button variant="ghost" style={{ alignSelf: "flex-start" }} onClick={onSairAdmin}>
                Sair
              </Button>
            </>
          ) : (
            <>
              <Input
                type="email"
                placeholder="E-mail de administrador"
                value={emailAdminForm}
                onChange={(e) => setEmailAdminForm(e.target.value)}
              />
              <Input
                type="password"
                placeholder="Senha de administrador"
                value={senhaAdminForm}
                onChange={(e) => setSenhaAdminForm(e.target.value)}
              />
              {erroAdmin && <div style={{ fontSize: 12.5, color: COLORS.rust }}>{erroAdmin}</div>}
              <Button style={{ alignSelf: "flex-start" }} onClick={handleEntrarAdmin} disabled={entrandoAdmin}>
                {entrandoAdmin ? "Entrando…" : "Entrar"}
              </Button>
            </>
          )}
        </div>
      )}

      <div
        style={{
          background: COLORS.card,
          border: `1.5px solid ${COLORS.rule}`,
          borderRadius: 10,
          padding: 16,
          marginTop: 16,
          display: "flex",
          flexDirection: "column",
          gap: 10,
        }}
      >
        <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 16 }}>
          Backup e histórico de salvamento
        </div>

        <div style={{ fontSize: 12.5, fontFamily: "'JetBrains Mono', monospace", color: COLORS.inkSoft, lineHeight: 1.7 }}>
          <div>{LABEL_SECAO.acervo}: salvo {fmtDataHora(ultimoSalvamento.acervo)}</div>
          <div>{LABEL_SECAO.pessoas}: salvo {fmtDataHora(ultimoSalvamento.pessoas)}</div>
          <div>{LABEL_SECAO.emprestimos}: salvo {fmtDataHora(ultimoSalvamento.emprestimos)}</div>
          <div>{LABEL_SECAO.ajustes}: salvo {fmtDataHora(ultimoSalvamento.ajustes)}</div>
        </div>

        <div style={{ height: 1, background: COLORS.rule, margin: "4px 0" }} />

        <div style={{ fontSize: 13.5 }}>
          Último backup: <b>{ultimoBackup ? fmtDataHora(ultimoBackup) : "nenhum ainda"}</b>
        </div>
        <div style={{ fontSize: 12, color: COLORS.inkSoft }}>
          Um backup automático é feito no máximo uma vez por dia, ao abrir o app. Você também pode fazer um manualmente
          quando quiser — por exemplo antes de usar dois aparelhos ao mesmo tempo.
        </div>
        <Button style={{ alignSelf: "flex-start" }} onClick={onFazerBackup} disabled={fazendoBackup}>
          {fazendoBackup ? "Fazendo backup…" : "Fazer backup agora"}
        </Button>

        <label style={{ ...labelStyle, marginTop: 6 }}>Backups disponíveis (acervo, pessoas, empréstimos e ajustes juntos)</label>
        {carregandoBackups && <div style={{ fontSize: 12.5, color: COLORS.inkSoft }}>Carregando…</div>}
        {!carregandoBackups && backups.length === 0 && (
          <div style={{ fontSize: 12.5, color: COLORS.inkSoft }}>Nenhum backup ainda.</div>
        )}
        <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 280, overflowY: "auto" }}>
          {backups.map((b) => (
            <div
              key={b.id}
              style={{
                display: "flex",
                alignItems: "center",
                gap: 8,
                border: `1px solid ${COLORS.rule}`,
                borderRadius: 8,
                padding: "8px 10px",
                background: "#fff",
              }}
            >
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13 }}>{fmtDataHora(b.criadoEm)}</div>
                <div style={{ fontSize: 11, color: COLORS.inkSoft, fontFamily: "'JetBrains Mono', monospace" }}>
                  {b.tipo === "manual" ? "manual" : "automático"}
                </div>
              </div>
              {restaurandoId === b.id ? (
                <span style={{ fontSize: 12.5, color: COLORS.inkSoft }}>restaurando…</span>
              ) : (
                <BotaoExcluir label="restaurar" small onConfirm={() => handleRestaurar(b)} />
              )}
              <BotaoExcluir label="apagar" small onConfirm={() => onApagarBackup(b)} />
            </div>
          ))}
        </div>
        {restauradoOk && (
          <div style={{ fontSize: 12.5, color: COLORS.sage }}>
            ✓ Backup restaurado — os dados deste aparelho já foram atualizados.
          </div>
        )}
      </div>

      <div
        style={{
          background: COLORS.card,
          border: `1.5px solid ${COLORS.rule}`,
          borderRadius: 10,
          padding: 16,
          marginTop: 16,
          display: "flex",
          flexDirection: "column",
          gap: 10,
        }}
      >
        <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 16 }}>
          Senha de acesso
        </div>

        {semSenha ? (
          <>
            <div style={{ fontSize: 13, color: COLORS.inkSoft }}>
              Este app está funcionando <b>sem senha</b> — abre direto, sem pedir nada. Os dados continuam
              criptografados por baixo dos panos, mas com uma chave fixa que está no código público do app,
              então isso não protege as informações de quem tiver acesso ao Firestore.
            </div>
            {!ativandoSenha ? (
              <Button style={{ alignSelf: "flex-start" }} onClick={() => setAtivandoSenha(true)}>
                Ativar senha
              </Button>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <Input
                  type="password"
                  placeholder="Nova senha"
                  value={novaSenhaAtivar}
                  onChange={(e) => setNovaSenhaAtivar(e.target.value)}
                />
                <Input
                  type="password"
                  placeholder="Confirme a nova senha"
                  value={confirmarSenhaAtivar}
                  onChange={(e) => setConfirmarSenhaAtivar(e.target.value)}
                />
                {erroSenha && <div style={{ fontSize: 12.5, color: COLORS.rust }}>{erroSenha}</div>}
                <div style={{ display: "flex", gap: 8 }}>
                  <Button onClick={handleAtivarSenha} disabled={trocandoSenha}>
                    {trocandoSenha ? "Ativando…" : "Confirmar"}
                  </Button>
                  <Button variant="ghost" onClick={() => setAtivandoSenha(false)}>
                    Cancelar
                  </Button>
                </div>
              </div>
            )}
          </>
        ) : (
          <>
            <label style={labelStyle}>Trocar senha</label>
            <Input
              type="password"
              placeholder="Senha atual"
              value={senhaAtualDigitada}
              onChange={(e) => setSenhaAtualDigitada(e.target.value)}
            />
            <Input
              type="password"
              placeholder="Nova senha"
              value={novaSenha}
              onChange={(e) => setNovaSenha(e.target.value)}
            />
            <Input
              type="password"
              placeholder="Confirme a nova senha"
              value={confirmarNovaSenha}
              onChange={(e) => setConfirmarNovaSenha(e.target.value)}
            />
            {erroSenha && <div style={{ fontSize: 12.5, color: COLORS.rust }}>{erroSenha}</div>}
            {okSenha && <div style={{ fontSize: 12.5, color: COLORS.sage }}>{okSenha}</div>}
            <Button style={{ alignSelf: "flex-start" }} onClick={handleTrocarSenha} disabled={trocandoSenha}>
              {trocandoSenha ? "Trocando…" : "Trocar senha"}
            </Button>
            <div style={{ fontSize: 11.5, color: COLORS.inkSoft }}>
              Isso já atualiza os backups existentes pra abrirem com a nova senha também. Em outros aparelhos
              conectados a esta biblioteca, você vai precisar digitar a nova senha também.
            </div>

            <div style={{ height: 1, background: COLORS.rule, margin: "4px 0" }} />

            <label style={labelStyle}>Usar sem senha</label>
            <div style={{ fontSize: 12, color: COLORS.inkSoft }}>
              Desativa a tela de senha — o app abre direto em qualquer aparelho. Os dados (nomes, telefones,
              valores combinados) ficam bem menos protegidos caso alguém acesse o Firestore diretamente.
            </div>
            {!confirmandoDesativar ? (
              <Button variant="ghost" style={{ alignSelf: "flex-start" }} onClick={() => setConfirmandoDesativar(true)}>
                Desativar senha
              </Button>
            ) : (
              <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <span style={{ fontSize: 12.5, color: COLORS.rust }}>Tem certeza? Isso não protege mais os dados.</span>
                <Button
                  style={{ background: COLORS.rust, border: "none", color: "#fff" }}
                  onClick={handleDesativarSenha}
                  disabled={trocandoSenha}
                >
                  {trocandoSenha ? "Desativando…" : "Confirmar"}
                </Button>
                <Button variant="ghost" onClick={() => setConfirmandoDesativar(false)}>
                  Cancelar
                </Button>
              </div>
            )}
          </>
        )}
      </div>
    </Section>
  );
}

// ---------------- Tela de senha ----------------
function TelaSenha({
  temDadosSalvos,
  onDesbloquear,
  onApagarTudo,
  onSemSenha,
  cloudConfig,
  cloudStatus,
  onConfigurarNuvem,
  onDesligarNuvem,
  onEntrarAdmin,
  statusAdminAuth,
}) {
  const [senha, setSenha] = useState("");
  const [confirmar, setConfirmar] = useState("");
  const [erro, setErro] = useState("");
  const [carregando, setCarregando] = useState(false);
  const [confirmandoReset, setConfirmandoReset] = useState(false);
  const [confirmandoSemSenha, setConfirmandoSemSenha] = useState(false);
  const [mostrarConfigNuvem, setMostrarConfigNuvem] = useState(false);
  const [colado, setColado] = useState("");
  const [docId, setDocId] = useState("principal");
  const [emailAdminForm, setEmailAdminForm] = useState("");
  const [senhaAdminForm, setSenhaAdminForm] = useState("");
  const [erroNuvem, setErroNuvem] = useState("");

  async function entrar() {
    setErro("");
    if (!senha) {
      setErro("Digite uma senha.");
      return;
    }
    if (!temDadosSalvos && senha !== confirmar) {
      setErro("As senhas não coincidem.");
      return;
    }
    if (!temDadosSalvos && senha.length < 4) {
      setErro("Use pelo menos 4 caracteres.");
      return;
    }
    setCarregando(true);
    const r = await onDesbloquear(senha);
    setCarregando(false);
    if (!r.ok) setErro(r.erro);
  }

  async function conectarNuvem() {
    setErroNuvem("");
    try {
      const obj = parseFirebaseConfigColado(colado);
      onConfigurarNuvem(obj, docId || "principal");
      if (emailAdminForm && senhaAdminForm) {
        const r = await onEntrarAdmin(emailAdminForm, senhaAdminForm);
        if (!r.ok) {
          setErroNuvem(r.erro);
          return;
        }
      }
      setMostrarConfigNuvem(false);
    } catch (e) {
      setErroNuvem("Não consegui ler essa configuração. Confere se colou o bloco inteiro do Firebase.");
    }
  }

  const conectandoNuvem = !!cloudConfig && cloudStatus === "conectando";

  return (
    <div
      style={{
        minHeight: "100vh",
        background: COLORS.burgundyDark,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        padding: 20,
        fontFamily: "'Source Serif 4', serif",
      }}
    >
      <div
        style={{
          background: COLORS.card,
          borderRadius: 14,
          padding: 28,
          maxWidth: 340,
          width: "100%",
          boxShadow: "0 20px 50px rgba(0,0,0,0.35)",
        }}
      >
        <div style={{ textAlign: "center", marginBottom: 6 }}>
          <span style={{ fontSize: 30 }}>🔒</span>
        </div>
        <h1
          style={{
            fontFamily: "'Playfair Display', serif",
            fontStyle: "italic",
            fontSize: 26,
            textAlign: "center",
            margin: "0 0 4px",
            color: COLORS.ink,
          }}
        >
          Sifriyah
        </h1>
        <div style={{ textAlign: "center", fontSize: 13, color: COLORS.inkSoft, marginBottom: 20 }}>
          {temDadosSalvos ? "Digite a senha pra abrir" : "Crie uma senha pra proteger os dados"}
        </div>

        {!cloudConfig && !mostrarConfigNuvem && (
          <div style={{ textAlign: "center", marginBottom: 16 }}>
            <button
              onClick={() => setMostrarConfigNuvem(true)}
              style={{ background: "none", border: "none", color: COLORS.burgundy, fontSize: 12.5, textDecoration: "underline", cursor: "pointer" }}
            >
              Já uso isso em outro aparelho — conectar à nuvem primeiro
            </button>
          </div>
        )}

        {!cloudConfig && mostrarConfigNuvem && (
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 18 }}>
            <label style={labelStyle}>Cole a configuração do Firebase (a mesma dos outros aparelhos)</label>
            <textarea
              value={colado}
              onChange={(e) => setColado(e.target.value)}
              placeholder={`const firebaseConfig = {\n  apiKey: "...",\n  projectId: "...",\n  ...\n};`}
              rows={5}
              style={{ ...inputBase, fontFamily: "'JetBrains Mono', monospace", fontSize: 12 }}
            />
            <label style={labelStyle}>Código da biblioteca (o mesmo usado nos outros aparelhos)</label>
            <Input value={docId} onChange={(e) => setDocId(e.target.value)} placeholder="principal" />
            <label style={labelStyle}>E-mail de administrador</label>
            <Input type="email" value={emailAdminForm} onChange={(e) => setEmailAdminForm(e.target.value)} />
            <label style={labelStyle}>Senha de administrador</label>
            <Input type="password" value={senhaAdminForm} onChange={(e) => setSenhaAdminForm(e.target.value)} />
            {erroNuvem && <div style={{ color: COLORS.rust, fontSize: 12.5 }}>{erroNuvem}</div>}
            <div style={{ display: "flex", gap: 8 }}>
              <Button style={{ flex: 1 }} onClick={conectarNuvem}>
                Conectar
              </Button>
              <Button variant="ghost" onClick={() => setMostrarConfigNuvem(false)}>
                Cancelar
              </Button>
            </div>
          </div>
        )}

        {cloudConfig && (
          <div style={{ textAlign: "center", fontSize: 12, color: COLORS.inkSoft, marginBottom: 16 }}>
            {conectandoNuvem ? (
              <span style={{ color: COLORS.gold }}>conectando à nuvem…</span>
            ) : (
              <>
                conectado: <b>{cloudConfig.projectId}</b> · código <b>{cloudConfig.docId}</b>{" "}
                <button
                  onClick={onDesligarNuvem}
                  style={{ background: "none", border: "none", color: COLORS.burgundy, fontSize: 12, textDecoration: "underline", cursor: "pointer" }}
                >
                  trocar
                </button>
              </>
            )}
          </div>
        )}

        <Input
          type="password"
          placeholder="Senha"
          value={senha}
          onChange={(e) => setSenha(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && (temDadosSalvos ? entrar() : null)}
          style={{ marginBottom: 10 }}
          autoFocus
          disabled={conectandoNuvem}
        />
        {!temDadosSalvos && (
          <Input
            type="password"
            placeholder="Confirme a senha"
            value={confirmar}
            onChange={(e) => setConfirmar(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && entrar()}
            style={{ marginBottom: 10 }}
            disabled={conectandoNuvem}
          />
        )}

        {erro && <div style={{ color: COLORS.rust, fontSize: 13, marginBottom: 10 }}>{erro}</div>}

        <Button onClick={entrar} style={{ width: "100%" }} disabled={carregando || conectandoNuvem}>
          {conectandoNuvem ? "Conectando…" : carregando ? "Abrindo…" : temDadosSalvos ? "Entrar" : "Criar e continuar"}
        </Button>

        {!conectandoNuvem && !temDadosSalvos && !confirmandoSemSenha && (
          <div style={{ textAlign: "center", marginTop: 14 }}>
            <button
              onClick={() => setConfirmandoSemSenha(true)}
              style={{ background: "none", border: "none", color: COLORS.inkSoft, fontSize: 12, textDecoration: "underline", cursor: "pointer" }}
            >
              usar sem senha
            </button>
          </div>
        )}
        {confirmandoSemSenha && (
          <div style={{ marginTop: 14, textAlign: "center", fontSize: 12.5, color: COLORS.inkSoft }}>
            Sem senha, os dados (nomes, telefones, valores) ficam bem menos protegidos caso alguém acesse o Firestore
            diretamente. Só recomendado se isso não for um problema pra você.
            <div style={{ marginTop: 8, display: "flex", gap: 8, justifyContent: "center" }}>
              <Button variant="ghost" style={{ padding: "6px 12px", fontSize: 12.5 }} onClick={() => setConfirmandoSemSenha(false)}>
                Cancelar
              </Button>
              <Button variant="subtle" style={{ padding: "6px 12px", fontSize: 12.5 }} onClick={onSemSenha}>
                Usar sem senha
              </Button>
            </div>
          </div>
        )}

        {!conectandoNuvem && temDadosSalvos && !confirmandoReset && (
          <div style={{ textAlign: "center", marginTop: 14 }}>
            <button
              onClick={() => setConfirmandoReset(true)}
              style={{ background: "none", border: "none", color: COLORS.inkSoft, fontSize: 12, textDecoration: "underline", cursor: "pointer" }}
            >
              esqueci a senha
            </button>
          </div>
        )}
        {confirmandoReset && (
          <div style={{ marginTop: 14, textAlign: "center", fontSize: 12.5, color: COLORS.rust }}>
            Sem a senha não dá pra recuperar os dados. A única saída é apagar tudo e recomeçar do zero.
            <div style={{ marginTop: 8, display: "flex", gap: 8, justifyContent: "center" }}>
              <Button variant="ghost" style={{ padding: "6px 12px", fontSize: 12.5 }} onClick={() => setConfirmandoReset(false)}>
                Cancelar
              </Button>
              <Button variant="subtle" style={{ padding: "6px 12px", fontSize: 12.5, color: COLORS.rust }} onClick={onApagarTudo}>
                Apagar tudo
              </Button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function EmptyState({ text }) {
  return (
    <div style={{ border: `1.5px dashed ${COLORS.rule}`, borderRadius: 10, padding: "24px 16px", textAlign: "center", color: COLORS.inkSoft, fontSize: 14, marginBottom: 16 }}>
      {text}
    </div>
  );
}

const labelStyle = {
  fontFamily: "'JetBrains Mono', monospace",
  fontSize: 10.5,
  letterSpacing: 0.5,
  textTransform: "uppercase",
  color: COLORS.inkSoft,
  marginBottom: -4,
};

const inputBase = {
  fontFamily: "'Source Serif 4', serif",
  fontSize: 15,
  padding: "10px 12px",
  borderRadius: 6,
  border: `1.5px solid ${COLORS.rule}`,
  background: "#fff",
  color: COLORS.ink,
  outline: "none",
  width: "100%",
  boxSizing: "border-box",
};


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

<script>
  var src = document.getElementById("app-source").textContent;
  var compilado = Babel.transform(src, {
    presets: [["react", { runtime: "classic" }]]
  }).code;
  try {
    (0, eval)(compilado);
  } catch (err) {
    document.getElementById("root").innerHTML =
      "<div style='padding:24px;font-family:sans-serif;color:#6B2737'>" +
      "<b>Erro ao carregar o Sifriyah:</b><br>" + (err && err.message ? err.message : err) +
      "</div>";
    console.error(err);
  }
</script>
